            )}
            <div className="flex-1 min-w-0">
              <p className="font-bold text-gray-900 truncate text-sm flex items-center gap-1.5">
                {exp.description}
                {exp.receipt && <CameraIco size={11} cls="text-[#725E54] shrink-0"/>}
              </p>
              <p className="text-xs text-gray-600">{payer?.name || '?'} paid · {new Date(exp.date).toLocaleDateString()}</p>
            </div>
            <div className="text-right flex-shrink-0">
              <p className="font-bold text-gray-900 text-sm tabular-nums">{fmt(exp.amount, exp.currency)}</p>
              {inBase && <p className="text-[11px] text-gray-500 tabular-nums">≈ {fmt(inBase, group.currency)}</p>}
            </div>
            <span className="p-1 text-gray-400 ml-1">
              {open ? <ChevUpIco/> : <ChevDownIco/>}
            </span>
          </button>
          {open && (
            <div className="border-t border-gray-100 px-3.5 py-3">
              {exp.receipt && (
                <div className="mb-3">
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-1.5">Receipt</p>
                  <button onClick={() => setViewReceipt(true)}
                    className="block hover:opacity-90 transition-opacity">
                    <img src={exp.receipt} alt="Receipt"
                      className="h-24 rounded-xl border border-gray-200 object-cover"/>
                  </button>
                </div>
              )}
              <div className="flex items-center justify-between mb-2">
                <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">Split ({exp.splitMethod})</p>
                <button onClick={() => { if (confirm('Delete this expense?')) onDel(); }}
                  className="text-xs text-rose-500 hover:text-rose-700 flex items-center gap-1 transition-colors font-semibold">
                  <TrashIco size={12}/>Delete
                </button>
              </div>
              <div className="space-y-1.5">
                {Object.entries(exp.splits).map(([mid, share]) => {
                  if (share < 0.001) return null;
                  const mem = group.members.find(m => m.id === mid);
                  if (!mem) return null;
                  return (
                    <div key={mid} className="flex items-center justify-between text-sm">
                      <div className="flex items-center gap-2">
                        <Avatar member={mem} size="sm"/>
                        <span className="text-gray-700">{mem.name}</span>
                        {mid === exp.paidBy && (
                          <span className="text-xs bg-[#EEF0FC] text-[#725E54] px-1.5 py-0.5 rounded font-medium">paid</span>
                        )}
                      </div>
                      <span className="font-semibold text-gray-700">{fmt(share, exp.currency)}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
        {viewReceipt && exp.receipt && (
          <Modal onClose={() => setViewReceipt(false)}>
            <div className="p-4">
              <div className="flex items-center justify-between mb-3">
                <p className="font-bold text-gray-900 text-sm truncate flex-1">{exp.description}</p>
                <button onClick={() => setViewReceipt(false)} aria-label="Close"
                  className="p-1.5 hover:bg-gray-100 rounded-lg shrink-0"><XIco size={18} cls="text-gray-500"/></button>
              </div>
              <img src={exp.receipt} alt="Receipt"
                className="w-full max-h-[70vh] object-contain rounded-xl bg-gray-50"/>
            </div>
          </Modal>
        )}
        </>
      );
    }

    function DebtItem({ debt, group, onSettle }) {
      const from = group.members.find(m => m.id === debt.from);
      const to   = group.members.find(m => m.id === debt.to);
      return (
        <div className="bg-white rounded-xl p-3.5 border border-gray-100 shadow-sm flex items-center justify-between gap-3">
          <div className="flex items-center gap-2 flex-1 min-w-0">
            <Avatar member={from || {id:'?',name:'?'}} size="sm"/>
            <div className="flex items-center gap-1.5 min-w-0">
              <span className="text-sm font-semibold text-gray-700 truncate">{from?.name}</span>
              <ArrIco size={14} cls="text-gray-300 flex-shrink-0"/>
              <Avatar member={to || {id:'?',name:'?'}} size="sm"/>
              <span className="text-sm font-semibold text-gray-700 truncate">{to?.name}</span>
            </div>
          </div>
          <div className="flex items-center gap-2 flex-shrink-0">
            <span className="font-bold text-amber-500 text-sm">{fmt(debt.amount, group.currency)}</span>
            <button onClick={onSettle}
              className="bg-[#725E54] text-white text-xs px-2.5 py-1.5 rounded-lg font-semibold hover:bg-[#443627] transition-colors">
              Settle
            </button>
          </div>
        </div>
      );
    }

    // ── Profile View ─────────────────────────────────────────────
    function ProfileView({ groups, prefs, onUpdatePrefs, onClearData, onImport, user, authReady, onSendMagicLink, onSignOut, syncStatus, lastSync, alerts, onRemoveAlert, onToggleAlertPause }) {
      const fileRef = useRef(null);
      const [email, setEmail] = useState('');
      const [sending, setSending] = useState(false);
      const [sent, setSent] = useState(false);
      const emailValid = /^\S+@\S+\.\S+$/.test(email.trim());

      const submitSignIn = async (e) => {
        e?.preventDefault();
        if (!emailValid || sending) return;
        setSending(true);
        const ok = await onSendMagicLink(email.trim());
        setSending(false);
        if (ok) setSent(true);
      };

      const initial = user
        ? (user.email || '?')[0].toUpperCase()
        : (prefs.name || 'G')[0].toUpperCase();

      const stats = useMemo(() => {
        const expenses = groups.reduce((s, g) => s + g.expenses.length, 0);
        const settlements = groups.reduce((s, g) => s + g.settlements.length, 0);
        const currencies = new Set();
        groups.forEach(g => {
          currencies.add(g.currency);
          g.expenses.forEach(e => currencies.add(e.currency));
        });
        const totalByCur = {};
        groups.forEach(g => {
          g.expenses.forEach(e => {
            totalByCur[e.currency] = (totalByCur[e.currency] || 0) + (e.amount || 0);
          });
        });
        return { trips: groups.length, expenses, settlements, currencies: currencies.size, totalByCur };
      }, [groups]);

      const exportData = () => {
        const data = {
          version: 1,
          exportedAt: new Date().toISOString(),
          groups,
          prefs,
          favorites: JSON.parse(localStorage.getItem('spliteasy-fav') || '[]'),
          order: JSON.parse(localStorage.getItem('spliteasy-order') || '[]'),
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `spliteasy-backup-${isoDate(new Date())}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      };

      const onFile = (e) => {
        const f = e.target.files?.[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
          try { onImport(JSON.parse(ev.target.result)); }
          catch { onImport(null); }
        };
        r.readAsText(f);
        e.target.value = '';
      };

      const Row = ({ icon, label, value, onClick, danger=false, last=false }) => (
        <button onClick={onClick}
          className={`w-full px-4 py-3.5 flex items-center justify-between text-left transition-colors hover:bg-gray-50 ${last ? '' : 'border-b border-gray-50'}`}>
          <span className="flex items-center gap-3">
            <span className={`w-8 h-8 rounded-lg flex items-center justify-center ${danger ? 'bg-rose-50 text-rose-500' : 'bg-[#EEF0FC] text-[#725E54]'}`}>
              {icon}
            </span>
            <span className={`text-sm font-semibold ${danger ? 'text-rose-600' : 'text-gray-800'}`}>{label}</span>
          </span>
          <span className="flex items-center gap-1.5 text-gray-500">
            {value && <span className="text-sm font-medium">{value}</span>}
            <ChevRightIco size={14}/>
          </span>
        </button>
      );

      return (
        <div className="max-w-lg mx-auto pb-24">
          {/* Header */}
          <div className="px-4 pt-12 pb-2">
            <div className="app-header rounded-2xl px-5 py-3.5">
              <div className="flex items-center gap-3 relative z-10">
                <div className="app-logo" style={{background: 'linear-gradient(135deg, #D5DCF9, #A7B0CA)'}}>
                  <ProfileIco size={14} cls="text-[#2a1f15]"/>
                </div>
                <div>
                  <h1 className="text-base font-bold text-white tracking-tight leading-tight">Profile</h1>
                  <p className="text-[#D5DCF9] text-[11px] leading-tight opacity-90">Your account & app settings</p>
                </div>
              </div>
            </div>
          </div>

          <div className="px-4 py-3 space-y-4">
            {/* Account card */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
              <div className="flex items-center gap-3.5">
                <div className="w-14 h-14 rounded-full bg-gradient-to-br from-[#725E54] to-[#A7B0CA] flex items-center justify-center text-white font-bold text-xl">
                  {initial}
                </div>
                <div className="flex-1 min-w-0">
                  {user ? (
                    <>
                      <p className="font-bold text-gray-900 truncate">{user.email}</p>
                      {syncStatus === 'syncing' ? (
                        <p className="text-xs text-[#725E54] font-semibold flex items-center gap-1.5">
                          <RefreshIco size={11} cls="animate-spin"/>Syncing…
                        </p>
                      ) : syncStatus === 'error' ? (
                        <p className="text-xs text-rose-600 font-semibold flex items-center gap-1.5">
                          <span className="w-1.5 h-1.5 rounded-full bg-rose-500"/>Sync error
                        </p>
                      ) : lastSync ? (
                        <p className="text-xs text-emerald-700 font-semibold flex items-center gap-1.5">
                          <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"/>
                          Synced {timeAgo(lastSync)}
                        </p>
                      ) : (
                        <p className="text-xs text-gray-500 font-semibold flex items-center gap-1.5">
                          <span className="w-1.5 h-1.5 rounded-full bg-gray-400"/>Signed in
                        </p>
                      )}
                    </>
                  ) : (
                    <>
                      <p className="font-bold text-gray-900">Guest</p>
                      <p className="text-xs text-gray-500">Local account · this device only</p>
                    </>
                  )}
                </div>
                {user && (
                  <button onClick={onSignOut}
                    className="text-xs font-semibold text-gray-700 hover:text-rose-600 px-3 py-1.5 rounded-lg border border-gray-200 hover:border-rose-200 hover:bg-rose-50 transition-colors shrink-0">
                    Sign out
                  </button>
                )}
              </div>

              {!user && authReady && (
                sent ? (
                  <div className="mt-4 bg-emerald-50 border border-emerald-200/60 rounded-xl p-3.5">
                    <div className="flex items-start gap-2.5">
                      <div className="w-7 h-7 rounded-full bg-emerald-500 flex items-center justify-center shrink-0 mt-0.5">
                        <CheckIco size={14} cls="text-white"/>
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="text-sm font-bold text-emerald-800">Magic link sent</p>
                        <p className="text-[11px] text-emerald-700 leading-snug mt-0.5">
                          Check {email} — open the link on this device to sign in. The link expires in 1 hour.
                        </p>
                        <button onClick={() => { setSent(false); setEmail(''); }}
                          className="text-[11px] font-bold text-emerald-700 underline mt-1.5">
                          Use a different email
                        </button>
                      </div>
                    </div>
                  </div>
                ) : (
                  <form onSubmit={submitSignIn} className="mt-4 bg-[#EEF0FC] rounded-xl p-3">
                    <p className="text-[11px] font-bold text-[#443627] uppercase tracking-wider mb-1.5">Sign in to sync across devices</p>
                    <div className="flex gap-2">
                      <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                        placeholder="you@email.com" autoComplete="email" inputMode="email"
                        aria-label="Email address"
                        className="flex-1 bg-white rounded-lg px-3 py-2 text-sm border border-transparent focus:outline-none focus:border-[#725E54] focus:ring-2 focus:ring-[#725E54]/30 min-w-0"/>
                      <button type="submit" disabled={!emailValid || sending}
                        className="bg-[#725E54] text-white text-sm font-bold px-3.5 py-2 rounded-lg hover:bg-[#443627] active:scale-95 transition-all shrink-0 disabled:opacity-40 disabled:cursor-not-allowed">
                        {sending ? '…' : 'Send link'}
                      </button>
                    </div>
                    <p className="text-[10px] text-[#725E54] mt-1.5 leading-tight">
                      No password needed · We'll email you a one-tap link
                    </p>
                  </form>
                )
              )}
            </div>

            {/* Activity stats */}
            <div>
              <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">Your activity</p>
              <div className="grid grid-cols-3 gap-2">
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 text-center">
                  <p className="text-2xl font-bold text-[#443627] tabular-nums">{stats.trips}</p>
                  <p className="text-[11px] text-gray-500 font-semibold mt-0.5">Trips</p>
                </div>
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 text-center">
                  <p className="text-2xl font-bold text-[#443627] tabular-nums">{stats.expenses}</p>
                  <p className="text-[11px] text-gray-500 font-semibold mt-0.5">Expenses</p>
                </div>
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 text-center">
                  <p className="text-2xl font-bold text-[#443627] tabular-nums">{stats.currencies}</p>
                  <p className="text-[11px] text-gray-500 font-semibold mt-0.5">Currencies</p>
                </div>
              </div>
            </div>

            {/* Spending breakdown by currency */}
            {Object.keys(stats.totalByCur).length > 0 && (
              <div>
                <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">Total tracked</p>
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-2">
                  {Object.entries(stats.totalByCur)
                    .sort((a,b) => b[1]-a[1])
                    .slice(0, 5)
                    .map(([cur, total]) => {
                      const c = getCur(cur);
                      return (
                        <div key={cur} className="flex items-center justify-between">
                          <div className="flex items-center gap-2">
                            <span className="text-xl leading-none">{c?.flag || '🌐'}</span>
                            <span className="text-sm font-medium text-gray-700">{c?.name || cur}</span>
                          </div>
                          <p className="font-bold text-gray-900 tabular-nums text-sm">{fmt(total, cur)}</p>
                        </div>
                      );
                    })}
                </div>
              </div>
            )}

            {/* Preferences */}
            <div>
              <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">Preferences</p>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div className="px-4 py-3.5 flex items-center justify-between border-b border-gray-50">
                  <span className="flex items-center gap-3">
                    <span className="w-8 h-8 rounded-lg bg-[#EEF0FC] flex items-center justify-center text-[#725E54]">
                      <GlobeIco size={15}/>
                    </span>
                    <span className="text-sm font-semibold text-gray-800">Default currency</span>
                  </span>
                  <CurrencyPicker value={prefs.defaultCurrency}
                    onChange={code => onUpdatePrefs({ defaultCurrency: code })}
                    ariaLabel="Default currency"/>
                </div>
                <div className="px-4 py-3.5 flex items-center justify-between">
                  <span className="flex items-center gap-3">
                    <span className="w-8 h-8 rounded-lg bg-[#EEF0FC] flex items-center justify-center text-[#725E54]">
                      <SparkleIco size={14}/>
                    </span>
                    <span className="text-sm font-semibold text-gray-800">Language</span>
                  </span>
                  <span className="text-sm text-gray-500">English (UK)</span>
                </div>
              </div>
            </div>

            {/* Alerts */}
            {alerts && alerts.length > 0 && (
              <div>
                <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">Rate alerts</p>
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden divide-y divide-gray-50">
                  {alerts.map(a => {
                    const base = getCur(a.baseCur), target = getCur(a.targetCur);
                    const active = !a.paused;
                    return (
                      <div key={a.id} className="px-4 py-3 flex items-center gap-3">
                        <div className={`w-9 h-9 rounded-full flex items-center justify-center shrink-0 transition-colors ${active ? 'bg-amber-50' : 'bg-gray-100'}`}>
                          <BellIco size={16} cls={active ? 'text-amber-500' : 'text-gray-400'}/>
                        </div>
                        <div className={`flex-1 min-w-0 ${a.paused ? 'opacity-60' : ''}`}>
                          <p className="text-sm font-bold text-gray-900 leading-tight">
                            {base?.flag} {a.baseCur} → {target?.flag} {a.targetCur}
                          </p>
                          <p className="text-[11px] text-gray-500 leading-tight mt-0.5">
                            {a.direction === 'above' ? '▲ above' : '▼ below'} {fmtRate(a.threshold)} · {a.paused ? 'Paused' : a.lastTriggered ? `Last fired ${timeAgo(a.lastTriggered)}` : 'Waiting…'}
                          </p>
                        </div>
                        {/* Toggle switch */}
                        <button onClick={() => onToggleAlertPause(a.id)}
                          role="switch" aria-checked={active}
                          aria-label={active ? 'Pause alert' : 'Resume alert'}
                          className={`relative w-11 h-6 rounded-full shrink-0 transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#725E54] ${active ? 'bg-emerald-500' : 'bg-gray-300'}`}>
                          <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow-md transition-all ${active ? 'left-[22px]' : 'left-0.5'}`}/>
                        </button>
                        <button onClick={() => { if (confirm('Delete this alert?')) onRemoveAlert(a.id); }}
                          aria-label="Delete alert"
                          className="p-1.5 text-gray-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors shrink-0">
                          <TrashIco size={14}/>
                        </button>
                      </div>
                    );
                  })}
                </div>
                <p className="text-[11px] text-gray-500 mt-2 px-1 leading-relaxed">
                  Tap the 🔔 next to a watchlist currency to add an alert. They fire when you open the app.
                </p>
              </div>
            )}

            {/* Data */}
            <div>
              <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">Your data</p>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <Row icon={<DownloadIco size={15}/>} label="Export backup (.json)" onClick={exportData}/>
                <Row icon={<UploadIco size={15}/>}   label="Import backup"         onClick={() => fileRef.current?.click()}/>
                <Row icon={<TrashIco size={15}/>}    label="Clear all data"        onClick={onClearData} danger last/>
                <input ref={fileRef} type="file" accept="application/json" onChange={onFile} className="hidden"/>
              </div>
              <p className="text-[11px] text-gray-500 mt-2 px-1 leading-relaxed">
                Your data lives on this device only. Export a backup before clearing your browser.
              </p>
            </div>

            {/* About */}
            <div>
              <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1">About</p>
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 px-4 py-3 flex items-center justify-between">
                <span className="text-sm text-gray-700 font-medium">SplitEasy</span>
                <span className="text-xs text-gray-500">v1.0</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Add Group Modal ──────────────────────────────────────────
    function AddGroupModal({ onClose, onAdd, prefs }) {
      const [name, setName]       = useState('');
      const [currency, setCur]    = useState(prefs?.defaultCurrency || 'USD');
      const [members, setMembers] = useState([{ id: uid(), name:'', email:'' }]);

      const addRow    = () => setMembers(p => [...p, { id: uid(), name:'', email:'' }]);
      const removeRow = id => setMembers(p => p.filter(m => m.id !== id));
      const updateRow = (id, field, v) => setMembers(p => p.map(m => m.id === id ? { ...m, [field]: v } : m));

      const submit = () => {
        if (!valid) return;
        const mems = members.filter(m => m.name.trim()).map(m => ({
          ...m,
          name: m.name.trim(),
          email: (m.email || '').trim().toLowerCase() || null
        }));
        onAdd({ name: name.trim(), currency, members: mems });
        onClose();

      return (
        <Modal onClose={onClose}>
          <div className="sticky top-0 bg-white z-10 px-6 pt-5 pb-3 border-b border-gray-100 flex items-center justify-between">

            <button onClick={onClose} aria-label="Close" className="p-2 hover:bg-gray-100 rounded-xl transition-colors">
              <XIco size={20} cls="text-gray-500"/>
            </button>
          </div>
          <div className="px-6 py-4 space-y-4">
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Trip name</label>
                <input autoFocus value={name} onChange={e => setName(e.target.value)}
                  placeholder="e.g. Paris Trip, Roommates…"
                  className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
              </div>
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Base currency</label>
                <CurrencyPicker value={currency} onChange={setCur} variant="block" ariaLabel="Base currency for this trip"/>
              </div>
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Members</label>
                <div className="space-y-2">
                  {members.map((m, i) => (
                    <div key={m.id} className="bg-gray-50 rounded-xl p-2.5 space-y-1.5 relative">
                      <div className="flex gap-2">
                        <input value={m.name} onChange={e => updateRow(m.id, 'name', e.target.value)}
                          placeholder={`Name ${i + 1}`}
                          aria-label={`Member ${i + 1} name`}
                          className="flex-1 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6] min-w-0"/>
                        {members.length > 1 && (
                          <button onClick={() => removeRow(m.id)}
                            aria-label="Remove member"
                            className="p-2 text-gray-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors shrink-0">
                            <XIco size={15}/>
                          </button>
                        )}
                      </div>
                      <input type="email" value={m.email} onChange={e => updateRow(m.id, 'email', e.target.value)}
                        placeholder="Email (optional — for syncing & invites)"
                        aria-label={`Member ${i + 1} email`}
                        inputMode="email" autoComplete="email"
                        className="w-full bg-white border border-gray-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
                    </div>
                  ))}
                </div>
                <button onClick={addRow}
                  className="mt-2 text-sm text-[#725E54] flex items-center gap-1 hover:text-[#443627] transition-colors font-medium">
                  <PlusIco size={15}/>Add member
                </button>
              </div>
          </div>
          <div className="sticky bottom-0 bg-white px-6 pt-3 border-t border-gray-100"
            style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom))' }}>
            <button onClick={submit} disabled={!valid}
              className="w-full bg-gradient-to-r from-[#443627] to-[#725E54] text-white py-3.5 rounded-xl font-bold hover:shadow-md active:scale-[0.98] transition-all disabled:opacity-40 disabled:cursor-not-allowed">
              Create Trip
            </button>
          </div>
        </Modal>
      );
    }

    // ── Add Expense Modal ────────────────────────────────────────
    function AddExpenseModal({ group, rates, onClose, onAdd }) {
      const [desc, setDesc]     = useState('');
      const [amount, setAmt]    = useState('');
      const [currency, setCur]  = useState(group.currency);
      const [paidBy, setPaid]   = useState(group.members[0]?.id || '');
      const [method, setMethod] = useState('equal');
      const [receipt, setReceipt] = useState(null);
      const [receiptLoad, setReceiptLoad] = useState(false);
      const [photoSheet, setPhotoSheet] = useState(false);
      const [scanning, setScanning] = useState(false);
      const [scanResult, setScanResult] = useState(null);
      const [scanError, setScanError] = useState(null);
      const [showItems, setShowItems] = useState(true);
      const camRef = useRef(null);
      const galRef = useRef(null);
      const [selMem, setSelMem] = useState(() => new Set(group.members.map(m => m.id)));
      const [exactV, setExactV] = useState(() => {
        const o = {}; group.members.forEach(m => { o[m.id] = ''; }); return o;
      });
      const [pctV, setPctV] = useState(() => {
        const o = {}, n = group.members.length;
        const base = n > 0 ? Math.floor(100 / n) : 0;
        const rem  = n > 0 ? 100 - base * n : 0;
        group.members.forEach((m, i) => { o[m.id] = String(i === 0 ? base + rem : base); });
        return o;
      });

      const runScan = async (imageDataUrl, hint) => {
        setScanning(true);
        setScanError(null);
        try {
          const { data, error } = await sb.functions.invoke('scan-receipt', {
            body: { image: imageDataUrl, currencyHint: hint || currency }
          });
          if (error) throw new Error(error.message || 'Scan failed');
          if (data?.error) throw new Error(data.error);
          // Auto-fill fields (don't overwrite user input)
          if (data.merchant && !desc.trim()) setDesc(data.merchant);
          if (typeof data.total === 'number' && data.total > 0 && !amount) setAmt(String(data.total));
          if (data.currency && CURRENCIES.some(c => c.code === data.currency)) setCur(data.currency);
          setScanResult(data);
          setShowItems(true);
        } catch (err) {
          setScanError(err?.message || 'Could not read this receipt');
        } finally {
          setScanning(false);
        }
      };

      const onPickPhoto = async (e) => {
        const f = e.target.files?.[0];
        if (!f) return;
        if (!/^image\//.test(f.type)) { e.target.value = ''; return; }
        setReceiptLoad(true);
        setScanResult(null);
        setScanError(null);
        try {
          const compressed = await resizeImage(f);
          setReceipt(compressed);
          // Auto-scan
          await runScan(compressed, currency);
        } catch {} finally {
          setReceiptLoad(false);
          e.target.value = '';
        }
      };

      const numAmt = parseFloat(amount) || 0;

      const computedSplits = useMemo(() => {
        const s = {}; group.members.forEach(m => { s[m.id] = 0; });
        if (method === 'equal') {
          const inc = [...selMem].filter(id => group.members.some(m => m.id === id));
          if (inc.length > 0) { const share = numAmt / inc.length; inc.forEach(id => { s[id] = share; }); }
        } else if (method === 'exact') {
          group.members.forEach(m => { s[m.id] = parseFloat(exactV[m.id]) || 0; });
        } else {
          group.members.forEach(m => { s[m.id] = numAmt * ((parseFloat(pctV[m.id]) || 0) / 100); });
        }
        return s;
      }, [method, selMem, exactV, pctV, numAmt, group.members]);

      const splitTotal = Object.values(computedSplits).reduce((s, v) => s + v, 0);
      const exactTotal = Object.values(exactV).reduce((s, v) => s + (parseFloat(v) || 0), 0);
      const pctTotal   = Object.values(pctV).reduce((s, v) => s + (parseFloat(v) || 0), 0);
      const isValid    = desc.trim() && numAmt > 0 && paidBy && Math.abs(splitTotal - numAmt) < 0.02;

      const toggleMem = id => setSelMem(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });

      const submit = () => {
        if (!isValid) return;
        onAdd({ description: desc.trim(), amount: numAmt, currency, paidBy, splitMethod: method, splits: computedSplits, receipt });
        onClose();
      };

      const inBase = currency !== group.currency && numAmt > 0 && Object.keys(rates).length > 0
        ? convert(numAmt, currency, group.currency, rates) : null;

      return (
        <Modal onClose={onClose}>
          <div className="sticky top-0 bg-white z-10 px-6 pt-5 pb-3 border-b border-gray-100 flex items-center justify-between">
            <h2 className="text-xl font-bold text-gray-900">Add Expense</h2>
            <button onClick={onClose} aria-label="Close" className="p-2 hover:bg-gray-100 rounded-xl"><XIco size={20} cls="text-gray-500"/></button>
          </div>
          <div className="px-6 py-4 space-y-4">
              <input ref={camRef} type="file" accept="image/*" capture="environment"
                onChange={onPickPhoto} className="hidden"/>
              <input ref={galRef} type="file" accept="image/*"
                onChange={onPickPhoto} className="hidden"/>

              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Description</label>
                <div className="flex gap-2">
                  <input autoFocus value={desc} onChange={e => setDesc(e.target.value)}
                    placeholder="What was this for?"
                    className="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6] min-w-0"/>
                  <button type="button" onClick={() => setPhotoSheet(true)} disabled={receiptLoad}
                    aria-label="Add receipt photo"
                    title="Add receipt photo"
                    className={`w-12 h-12 rounded-xl flex items-center justify-center shrink-0 transition-all relative ${
                      receipt
                        ? 'bg-gradient-to-br from-emerald-400 to-emerald-500 text-white shadow-sm hover:shadow-md'
                        : 'bg-[#EEF0FC] text-[#725E54] hover:bg-[#D5DCF9] hover:scale-105'
                    }`}>
                    {receiptLoad ? <RefreshIco size={18} cls="animate-spin"/> : <CameraIco size={18}/>}
                    {receipt && !receiptLoad && (
                      <span className="absolute -top-1 -right-1 w-3.5 h-3.5 bg-white rounded-full border-2 border-emerald-500"/>
                    )}
                  </button>
                </div>
                {receipt && (
                  <div className="mt-2 bg-emerald-50 border border-emerald-200/60 rounded-xl overflow-hidden">
                    {/* Top: thumbnail + status */}
                    <div className="flex items-center gap-2 p-2">
                      <img src={receipt} alt="Receipt"
                        className="w-12 h-12 rounded-lg object-cover border border-emerald-200/60"/>
                      <div className="flex-1 min-w-0">
                        {scanning ? (
                          <>
                            <p className="text-xs font-bold text-[#443627] flex items-center gap-1.5">
                              <RefreshIco size={11} cls="animate-spin"/>Reading receipt with AI…
                            </p>
                            <p className="text-[11px] text-gray-600">This usually takes 5-10 seconds</p>
                          </>
                        ) : scanError ? (
                          <>
                            <p className="text-xs font-bold text-rose-700">Scan failed</p>
                            <p className="text-[11px] text-rose-600 truncate">{scanError}</p>
                          </>
                        ) : scanResult ? (
                          <>
                            <p className="text-xs font-bold text-emerald-700 flex items-center gap-1">
                              <SparkleIco size={11}/>Scanned successfully
                            </p>
                            <p className="text-[11px] text-emerald-600">
                              {scanResult.merchant ? `${scanResult.merchant} · ` : ''}{scanResult.items?.length || 0} items
                            </p>
                          </>
                        ) : (
                          <>
                            <p className="text-xs font-bold text-emerald-700">Receipt attached</p>
                            <p className="text-[11px] text-emerald-600">Tap camera to replace</p>
                          </>
                        )}
                      </div>
                      {!scanning && scanError && (
                        <button type="button" onClick={() => runScan(receipt, currency)}
                          aria-label="Try scanning again"
                          className="px-2.5 py-1.5 text-[11px] font-bold text-rose-700 hover:bg-rose-100 rounded-lg transition-colors shrink-0">
                          Retry
                        </button>
                      )}
                      {!scanning && !scanError && !scanResult && (
                        <button type="button" onClick={() => runScan(receipt, currency)}
                          className="px-2.5 py-1.5 text-[11px] font-bold text-[#443627] bg-white hover:bg-[#EEF0FC] rounded-lg transition-colors shrink-0 flex items-center gap-1">
                          <SparkleIco size={11}/>Scan
                        </button>
                      )}
                      <button type="button" onClick={() => { setReceipt(null); setScanResult(null); setScanError(null); }}
                        aria-label="Remove receipt"
                        className="p-1.5 text-emerald-600 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors shrink-0">
                        <XIco size={15}/>
                      </button>
                    </div>

                    {/* Items breakdown */}
                    {scanResult && scanResult.items && scanResult.items.length > 0 && (
                      <div className="border-t border-emerald-200/60 bg-white">
                        <button type="button" onClick={() => setShowItems(v => !v)}
                          className="w-full px-3 py-2 flex items-center justify-between text-xs font-bold text-gray-700 hover:bg-gray-50">
                          <span className="flex items-center gap-1.5">
                            <span className="text-emerald-600">✨</span>
                            {scanResult.items.length} items detected
                          </span>
                          {showItems ? <ChevUpIco size={14} cls="text-gray-500"/> : <ChevDownIco size={14} cls="text-gray-500"/>}
                        </button>
                        {showItems && (
                          <div className="px-3 pb-2.5 space-y-1">
                            {scanResult.items.map((item, i) => (
                              <div key={i} className="flex items-center justify-between text-xs">
                                <span className="text-gray-700 truncate flex-1">{item.description}</span>
                                <span className="font-semibold text-gray-900 tabular-nums shrink-0 ml-2">
                                  {fmt(item.amount, scanResult.currency || currency)}
                                </span>
                              </div>
                            ))}
                            {(scanResult.subtotal != null || scanResult.tax != null || scanResult.tip != null) && (
                              <div className="pt-1.5 mt-1.5 border-t border-dashed border-gray-200 space-y-0.5">
                                {scanResult.subtotal != null && (
                                  <div className="flex justify-between text-[11px] text-gray-500">
                                    <span>Subtotal</span>
                                    <span className="tabular-nums">{fmt(scanResult.subtotal, scanResult.currency || currency)}</span>
                                  </div>
                                )}
                                {scanResult.tax != null && (
                                  <div className="flex justify-between text-[11px] text-gray-500">
                                    <span>Tax</span>
                                    <span className="tabular-nums">{fmt(scanResult.tax, scanResult.currency || currency)}</span>
                                  </div>
                                )}
                                {scanResult.tip != null && (
                                  <div className="flex justify-between text-[11px] text-gray-500">
                                    <span>Tip</span>
                                    <span className="tabular-nums">{fmt(scanResult.tip, scanResult.currency || currency)}</span>
                                  </div>
                                )}
                              </div>
                            )}
                            {scanResult.total != null && (
                              <div className="flex justify-between text-xs font-bold text-gray-900 pt-1.5 mt-1 border-t border-gray-200">
                                <span>Total</span>
                                <span className="tabular-nums">{fmt(scanResult.total, scanResult.currency || currency)}</span>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </div>
              <div className="flex gap-2">
                <div className="flex-1">
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Amount</label>
                  <input type="number" min="0" step="0.01" value={amount} onChange={e => setAmt(e.target.value)}
                    placeholder="0.00"
                    className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
                </div>
                <div className="w-32 shrink-0">
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Currency</label>
                  <CurrencyPicker value={currency} onChange={setCur} variant="block" ariaLabel="Expense currency"/>
                </div>
              </div>
              {inBase && (
                <div className="bg-blue-50 rounded-xl px-4 py-2 text-xs text-blue-600 font-medium">
                  ≈ {fmt(inBase, group.currency)} in {group.currency} (live rate)
                </div>
              )}
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Paid by</label>
                <div className="flex flex-wrap gap-2">
                  {group.members.map(m => (
                    <button key={m.id} onClick={() => setPaid(m.id)}
                      className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold border transition-all ${
                        paidBy === m.id ? 'bg-[#725E54] text-white border-[#725E54] shadow-sm' : 'bg-white text-gray-600 border-gray-200 hover:border-[#8EDCE6]'
                      }`}>
                      <Avatar member={m} size="sm"/>
                      <span className="max-w-[80px] truncate">{m.name}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Split method</label>
                <div className="grid grid-cols-3 gap-2">
                  {[['equal','= Equal'],['exact','$ Exact'],['percentage','% Percent']].map(([id, label]) => (
                    <button key={id} onClick={() => setMethod(id)}
                      className={`py-2.5 rounded-xl text-sm font-semibold border transition-all ${
                        method === id ? 'bg-[#725E54] text-white border-[#725E54] shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:border-[#8EDCE6]'
                      }`}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              {method === 'equal' && (
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Include in split</label>
                  <div className="space-y-1.5">
                    {group.members.map(m => {
                      const inc   = selMem.has(m.id);
                      const share = inc && selMem.size > 0 ? numAmt / selMem.size : 0;
                      return (
                        <div key={m.id} onClick={() => toggleMem(m.id)}
                          className={`flex items-center justify-between px-3 py-2.5 rounded-xl border cursor-pointer transition-all ${
                            inc ? 'border-[#D5DCF9] bg-[#EEF0FC]' : 'border-gray-100 bg-gray-50'
                          }`}>
                          <div className="flex items-center gap-2">
                            <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 ${inc ? 'bg-[#725E54] border-[#8EDCE6]' : 'border-gray-300'}`}>
                              {inc && <CheckIco size={11} cls="text-white"/>}
                            </div>
                            <Avatar member={m} size="sm"/>
                            <span className="text-sm text-gray-700 font-medium">{m.name}</span>
                          </div>
                          {inc && numAmt > 0 && <span className="text-sm font-bold text-[#725E54]">{fmt(share, currency)}</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {method === 'exact' && (
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Exact amounts</label>
                  <div className="space-y-2">
                    {group.members.map(m => (
                      <div key={m.id} className="flex items-center gap-2">
                        <Avatar member={m} size="sm"/>
                        <span className="flex-1 text-sm text-gray-700 font-medium truncate">{m.name}</span>
                        <span className="text-sm text-gray-500">{getSymbol(currency)}</span>
                        <input type="number" min="0" step="0.01" value={exactV[m.id]}
                          onChange={e => setExactV(p => ({ ...p, [m.id]: e.target.value }))}
                          placeholder="0.00"
                          className="w-24 border border-gray-200 rounded-lg px-2 py-2 text-sm text-right focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
                      </div>
                    ))}
                    <div className={`flex justify-between text-sm font-bold pt-1 ${Math.abs(exactTotal - numAmt) < 0.02 ? 'text-emerald-500' : 'text-amber-500'}`}>
                      <span>Total</span><span>{fmt(exactTotal, currency)} / {fmt(numAmt, currency)}</span>
                    </div>
                  </div>
                </div>
              )}
              {method === 'percentage' && (
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Percentages</label>
                  <div className="space-y-2">
                    {group.members.map(m => (
                      <div key={m.id} className="flex items-center gap-2">
                        <Avatar member={m} size="sm"/>
                        <span className="flex-1 text-sm text-gray-700 font-medium truncate">{m.name}</span>
                        <input type="number" min="0" max="100" step="1" value={pctV[m.id]}
                          onChange={e => setPctV(p => ({ ...p, [m.id]: e.target.value }))}
                          placeholder="0"
                          className="w-16 border border-gray-200 rounded-lg px-2 py-2 text-sm text-right focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
                        <span className="text-sm text-gray-500 w-4">%</span>
                        {numAmt > 0 && (
                          <span className="text-xs text-gray-500 w-20 text-right">
                            {fmt(numAmt * ((parseFloat(pctV[m.id]) || 0) / 100), currency)}
                          </span>
                        )}
                      </div>
                    ))}
                    <div className={`flex justify-between text-sm font-bold pt-1 ${Math.abs(pctTotal - 100) < 0.5 ? 'text-emerald-500' : 'text-amber-500'}`}>
                      <span>Total</span><span>{pctTotal.toFixed(1)}% / 100%</span>
                    </div>
                  </div>
                </div>
              )}
          </div>
          <div className="sticky bottom-0 bg-white px-6 pt-3 border-t border-gray-100"
            style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom))' }}>
            <button onClick={submit} disabled={!isValid}
              className="w-full bg-gradient-to-r from-[#443627] to-[#725E54] text-white py-3.5 rounded-xl font-bold hover:shadow-md active:scale-[0.98] transition-all disabled:opacity-40 disabled:cursor-not-allowed">
              Add Expense
            </button>
          </div>

          {photoSheet && (
            <div className="fixed inset-0 bg-black/40 z-[60] flex items-end justify-center"
              onClick={e => { if (e.target === e.currentTarget) setPhotoSheet(false); }}>
              <div className="bg-white rounded-t-3xl w-full max-w-lg slide-up shadow-2xl"
                style={{ paddingBottom: 'env(safe-area-inset-bottom)' }}>
                <div className="px-4 pt-3 pb-2">
                  <div className="w-10 h-1 bg-gray-300 rounded-full mx-auto mb-3"/>
                  <p className="text-center text-sm font-bold text-gray-900 mb-1">Add receipt photo</p>
                  <p className="text-center text-xs text-gray-500 mb-3">Choose a source</p>
                </div>
                <div className="px-4 pb-3 space-y-2">
                  <button type="button"
                    onClick={() => { setPhotoSheet(false); camRef.current?.click(); }}
                    className="w-full flex items-center gap-3 px-4 py-3.5 bg-gradient-to-r from-[#443627] to-[#725E54] text-white rounded-2xl font-semibold hover:shadow-md active:scale-[0.98] transition-all">
                    <span className="w-9 h-9 rounded-full bg-white/15 flex items-center justify-center">
                      <CameraIco size={18} cls="text-white"/>
                    </span>
                    <span className="flex-1 text-left">
                      <span className="block text-sm">Take photo</span>
                      <span className="block text-[11px] opacity-80">Open the camera</span>
                    </span>
                  </button>
                  <button type="button"
                    onClick={() => { setPhotoSheet(false); galRef.current?.click(); }}
                    className="w-full flex items-center gap-3 px-4 py-3.5 bg-[#EEF0FC] text-[#443627] rounded-2xl font-semibold hover:bg-[#D5DCF9] active:scale-[0.98] transition-all">
                    <span className="w-9 h-9 rounded-full bg-white flex items-center justify-center">
                      <UploadIco size={17} cls="text-[#725E54]"/>
                    </span>
                    <span className="flex-1 text-left">
                      <span className="block text-sm">Upload from gallery</span>
                      <span className="block text-[11px] text-[#725E54]">Pick an existing photo</span>
                    </span>
                  </button>
                </div>
                <div className="px-4 pb-4 pt-1">
                  <button type="button" onClick={() => setPhotoSheet(false)}
                    className="w-full py-3 text-sm font-semibold text-gray-700 hover:text-gray-900 rounded-xl border border-gray-200 hover:bg-gray-50">
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}
        </Modal>
      );
    }

    // ── Settle Up Modal ──────────────────────────────────────────
    function SettleUpModal({ group, debt, onClose, onSettle }) {
      const from = group.members.find(m => m.id === debt.from);
      const to   = group.members.find(m => m.id === debt.to);
      const [amount, setAmt]   = useState(debt.amount.toFixed(2));
      const [currency, setCur] = useState(group.currency);
      const [note, setNote]    = useState('');

      const submit = () => {
        const a = parseFloat(amount);
        if (!a || a <= 0) return;
        onSettle({ from: debt.from, to: debt.to, amount: a, currency, note: note.trim() });
        onClose();
      };

      return (
        <Modal onClose={onClose}>
          <div className="sticky top-0 bg-white z-10 px-6 pt-5 pb-3 border-b border-gray-100 flex items-center justify-between">
            <h2 className="text-xl font-bold text-gray-900">Settle Up</h2>
            <button onClick={onClose} aria-label="Close" className="p-2 hover:bg-gray-100 rounded-xl"><XIco size={20} cls="text-gray-500"/></button>
          </div>
          <div className="px-6 py-4 space-y-4">
            <div className="bg-gradient-to-br from-[#F5F2F0] to-[#EEF0FC] rounded-2xl p-5 flex items-center justify-center gap-6">
              <div className="text-center">
                <Avatar member={from || {id:'?',name:'?'}} size="lg"/>
                <p className="text-sm font-semibold text-gray-700 mt-2">{from?.name}</p>
                <p className="text-xs text-gray-500">pays</p>
              </div>
              <div className="flex flex-col items-center gap-1">
                <ArrIco size={22} cls="text-[#A7B0CA]"/>
                <span className="text-sm font-bold text-[#725E54]">{fmt(debt.amount, group.currency)}</span>
              </div>
              <div className="text-center">
                <Avatar member={to || {id:'?',name:'?'}} size="lg"/>
                <p className="text-sm font-semibold text-gray-700 mt-2">{to?.name}</p>
                <p className="text-xs text-gray-500">receives</p>
              </div>
            </div>
            <div className="flex gap-2">
              <div className="flex-1">
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Amount</label>
                <input type="number" min="0" step="0.01" value={amount} onChange={e => setAmt(e.target.value)}
                  className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
              </div>
              <div className="w-32 shrink-0">
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Currency</label>
                <CurrencyPicker value={currency} onChange={setCur} variant="block" ariaLabel="Settlement currency"/>
              </div>
            </div>
            <div>
              <label className="block text-sm font-semibold text-gray-700 mb-1.5">Note (optional)</label>
              <input value={note} onChange={e => setNote(e.target.value)}
                placeholder="e.g. Sent via Venmo"
                className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
            </div>
          </div>
          <div className="sticky bottom-0 bg-white px-6 pt-3 border-t border-gray-100"
            style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom))' }}>
            <button onClick={submit} disabled={!(parseFloat(amount) > 0)}
              className="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold hover:bg-emerald-700 active:scale-[0.98] transition-all disabled:opacity-40 flex items-center justify-center gap-2">
              <CheckIco size={18}/>Mark as Settled
            </button>
          </div>
        </Modal>
      );
    }

    // ── Bootstrap ────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/spliteasy/sw.js'));
    }
  </script>
</body>
</html>
