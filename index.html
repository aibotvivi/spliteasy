    // ── Add Expense Modal ────────────────────────────────────────
    function AddExpenseModal({ group, rates, onClose, onAdd }) {
      const [desc, setDesc]     = useState('');
      const [amount, setAmt]    = useState('');
      const [currency, setCur]  = useState(group.currency);
      const [paidBy, setPaid]   = useState(group.members[0]?.id || '');
      const [method, setMethod] = useState('equal');
      const [selMem, setSelMem] = useState(() => new Set(group.members.map(m => m.id)));
      const [exactV, setExactV] = useState(() => {
        const o = {}; group.members.forEach(m => { o[m.id] = ''; }); return o;
      });
      const [pctV, setPctV] = useState(() => {
        const o = {}, n = group.members.length;
        const base = n > 0 ? Math.floor(100 / n) : 0;
        const rem  = n > 0 ? 100 - base * n : 0;
        group.members.forEach((m, i) => { o[m.id] = String(i === 0 ? base + rem : base); });
        return o;
      });

      const numAmt = parseFloat(amount) || 0;

      const computedSplits = useMemo(() => {
        const s = {}; group.members.forEach(m => { s[m.id] = 0; });
        if (method === 'equal') {
          const inc = [...selMem].filter(id => group.members.some(m => m.id === id));
          if (inc.length > 0) { const share = numAmt / inc.length; inc.forEach(id => { s[id] = share; }); }
        } else if (method === 'exact') {
          group.members.forEach(m => { s[m.id] = parseFloat(exactV[m.id]) || 0; });
        } else {
          group.members.forEach(m => { s[m.id] = numAmt * ((parseFloat(pctV[m.id]) || 0) / 100); });
        }
        return s;
      }, [method, selMem, exactV, pctV, numAmt, group.members]);

      const splitTotal = Object.values(computedSplits).reduce((s, v) => s + v, 0);
      const exactTotal = Object.values(exactV).reduce((s, v) => s + (parseFloat(v) || 0), 0);
      const pctTotal   = Object.values(pctV).reduce((s, v) => s + (parseFloat(v) || 0), 0);
      const isValid    = desc.trim() && numAmt > 0 && paidBy && Math.abs(splitTotal - numAmt) < 0.02;

      const toggleMem = id => setSelMem(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });

      const submit = () => {
        if (!isValid) return;
        onAdd({ description: desc.trim(), amount: numAmt, currency, paidBy, splitMethod: method, splits: computedSplits });
        onClose();
      };

      const inBase = currency !== group.currency && numAmt > 0 && Object.keys(rates).length > 0
        ? convert(numAmt, currency, group.currency, rates) : null;

      return (
        <Modal onClose={onClose}>
          <div className="p-6">
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-xl font-bold text-gray-900">Add Expense</h2>
              <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-xl"><XIco size={20} cls="text-gray-400"/></button>
            </div>
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Description</label>
                <input autoFocus value={desc} onChange={e => setDesc(e.target.value)}
                  placeholder="What was this for?"
                  className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
              </div>
              <div className="flex gap-2">
                <div className="flex-1">
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Amount</label>
                  <input type="number" min="0" step="0.01" value={amount} onChange={e => setAmt(e.target.value)}
                    placeholder="0.00"
                    className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
                </div>
                <div className="w-28">
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Currency</label>
                  <select value={currency} onChange={e => setCur(e.target.value)}
                    className="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]">
                    {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.flag} {c.code}</option>)}
                  </select>
                </div>
              </div>
              {inBase && (
                <div className="bg-blue-50 rounded-xl px-4 py-2 text-xs text-blue-600 font-medium">
                  ≈ {fmt(inBase, group.currency)} in {group.currency} (live rate)
                </div>
              )}
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Paid by</label>
                <div className="flex flex-wrap gap-2">
                  {group.members.map(m => (
                    <button key={m.id} onClick={() => setPaid(m.id)}
                      className={`flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-semibold border transition-all ${
                        paidBy === m.id ? 'bg-[#725E54] text-white border-[#725E54] shadow-sm' : 'bg-white text-gray-600 border-gray-200 hover:border-[#8EDCE6]'
                      }`}>
                      <Avatar member={m} size="sm"/>
                      <span className="max-w-[80px] truncate">{m.name}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Split method</label>
                <div className="grid grid-cols-3 gap-2">
                  {[['equal','= Equal'],['exact','$ Exact'],['percentage','% Percent']].map(([id, label]) => (
                    <button key={id} onClick={() => setMethod(id)}
                      className={`py-2.5 rounded-xl text-sm font-semibold border transition-all ${
                        method === id ? 'bg-[#725E54] text-white border-[#725E54] shadow-sm' : 'bg-white text-gray-500 border-gray-200 hover:border-[#8EDCE6]'
                      }`}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              {method === 'equal' && (
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Include in split</label>
                  <div className="space-y-1.5">
                    {group.members.map(m => {
                      const inc   = selMem.has(m.id);
                      const share = inc && selMem.size > 0 ? numAmt / selMem.size : 0;
                      return (
                        <div key={m.id} onClick={() => toggleMem(m.id)}
                          className={`flex items-center justify-between px-3 py-2.5 rounded-xl border cursor-pointer transition-all ${
                            inc ? 'border-[#D5DCF9] bg-[#EEF0FC]' : 'border-gray-100 bg-gray-50'
                          }`}>
                          <div className="flex items-center gap-2">
                            <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 ${inc ? 'bg-[#725E54] border-[#8EDCE6]' : 'border-gray-300'}`}>
                              {inc && <CheckIco size={11} cls="text-white"/>}
                            </div>
                            <Avatar member={m} size="sm"/>
                            <span className="text-sm text-gray-700 font-medium">{m.name}</span>
                          </div>
                          {inc && numAmt > 0 && <span className="text-sm font-bold text-[#725E54]">{fmt(share, currency)}</span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {method === 'exact' && (
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Exact amounts</label>
                  <div className="space-y-2">
                    {group.members.map(m => (
                      <div key={m.id} className="flex items-center gap-2">
                        <Avatar member={m} size="sm"/>
                        <span className="flex-1 text-sm text-gray-700 font-medium truncate">{m.name}</span>
                        <span className="text-sm text-gray-400">{getSymbol(currency)}</span>
                        <input type="number" min="0" step="0.01" value={exactV[m.id]}
                          onChange={e => setExactV(p => ({ ...p, [m.id]: e.target.value }))}
                          placeholder="0.00"
                          className="w-24 border border-gray-200 rounded-lg px-2 py-2 text-sm text-right focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
                      </div>
                    ))}
                    <div className={`flex justify-between text-sm font-bold pt-1 ${Math.abs(exactTotal - numAmt) < 0.02 ? 'text-emerald-500' : 'text-amber-500'}`}>
                      <span>Total</span><span>{fmt(exactTotal, currency)} / {fmt(numAmt, currency)}</span>
                    </div>
                  </div>
                </div>
              )}
              {method === 'percentage' && (
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Percentages</label>
                  <div className="space-y-2">
                    {group.members.map(m => (
                      <div key={m.id} className="flex items-center gap-2">
                        <Avatar member={m} size="sm"/>
                        <span className="flex-1 text-sm text-gray-700 font-medium truncate">{m.name}</span>
                        <input type="number" min="0" max="100" step="1" value={pctV[m.id]}
                          onChange={e => setPctV(p => ({ ...p, [m.id]: e.target.value }))}
                          placeholder="0"
                          className="w-16 border border-gray-200 rounded-lg px-2 py-2 text-sm text-right focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
                        <span className="text-sm text-gray-400 w-4">%</span>
                        {numAmt > 0 && (
                          <span className="text-xs text-gray-500 w-20 text-right">
                            {fmt(numAmt * ((parseFloat(pctV[m.id]) || 0) / 100), currency)}
                          </span>
                        )}
                      </div>
                    ))}
                    <div className={`flex justify-between text-sm font-bold pt-1 ${Math.abs(pctTotal - 100) < 0.5 ? 'text-emerald-500' : 'text-amber-500'}`}>
                      <span>Total</span><span>{pctTotal.toFixed(1)}% / 100%</span>
                    </div>
                  </div>
                </div>
              )}
            </div>
            <button onClick={submit} disabled={!isValid}
              className="mt-6 w-full bg-[#725E54] text-white py-3.5 rounded-xl font-bold hover:bg-[#443627] transition-colors disabled:opacity-40">
              Add Expense
            </button>
          </div>
        </Modal>
      );
    }

    // ── Settle Up Modal ──────────────────────────────────────────
    function SettleUpModal({ group, debt, onClose, onSettle }) {
      const from = group.members.find(m => m.id === debt.from);
      const to   = group.members.find(m => m.id === debt.to);
      const [amount, setAmt]   = useState(debt.amount.toFixed(2));
      const [currency, setCur] = useState(group.currency);
      const [note, setNote]    = useState('');

      const submit = () => {
        const a = parseFloat(amount);
        if (!a || a <= 0) return;
        onSettle({ from: debt.from, to: debt.to, amount: a, currency, note: note.trim() });
        onClose();
      };

      return (
        <Modal onClose={onClose}>
          <div className="p-6">
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-xl font-bold text-gray-900">Settle Up</h2>
              <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-xl"><XIco size={20} cls="text-gray-400"/></button>
            </div>
            <div className="bg-gradient-to-br from-[#F5F2F0] to-[#EEF0FC] rounded-2xl p-5 mb-5 flex items-center justify-center gap-6">
              <div className="text-center">
                <Avatar member={from || {id:'?',name:'?'}} size="lg"/>
                <p className="text-sm font-semibold text-gray-700 mt-2">{from?.name}</p>
                <p className="text-xs text-gray-400">pays</p>
              </div>
              <div className="flex flex-col items-center gap-1">
                <ArrIco size={22} cls="text-[#A7B0CA]"/>
                <span className="text-sm font-bold text-[#725E54]">{fmt(debt.amount, group.currency)}</span>
              </div>
              <div className="text-center">
                <Avatar member={to || {id:'?',name:'?'}} size="lg"/>
                <p className="text-sm font-semibold text-gray-700 mt-2">{to?.name}</p>
                <p className="text-xs text-gray-400">receives</p>
              </div>
            </div>
            <div className="space-y-4">
              <div className="flex gap-2">
                <div className="flex-1">
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Amount</label>
                  <input type="number" min="0" step="0.01" value={amount} onChange={e => setAmt(e.target.value)}
                    className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
                </div>
                <div className="w-28">
                  <label className="block text-sm font-semibold text-gray-700 mb-1.5">Currency</label>
                  <select value={currency} onChange={e => setCur(e.target.value)}
                    className="w-full border border-gray-200 rounded-xl px-3 py-3 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]">
                    {CURRENCIES.map(c => <option key={c.code} value={c.code}>{c.flag} {c.code}</option>)}
                  </select>
                </div>
              </div>
              <div>
                <label className="block text-sm font-semibold text-gray-700 mb-1.5">Note (optional)</label>
                <input value={note} onChange={e => setNote(e.target.value)}
                  placeholder="e.g. Sent via Venmo"
                  className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"/>
              </div>
            </div>
            <button onClick={submit} disabled={!(parseFloat(amount) > 0)}
              className="mt-6 w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold hover:bg-emerald-700 transition-colors disabled:opacity-40 flex items-center justify-center gap-2">
              <CheckIco size={18}/>Mark as Settled
            </button>
          </div>
        </Modal>
      );
    }

    // ── Bootstrap ────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/spliteasy/sw.js'));
    }
  </script>
</body>
</html>
