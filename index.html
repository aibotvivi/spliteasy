    // Resize + compress image to a manageable base64 data URL
    function resizeImage(file, maxDim = 1000, quality = 0.72) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width > height && width > maxDim) {
              height = Math.round((height * maxDim) / width);
              width  = maxDim;
            } else if (height > maxDim) {
              width  = Math.round((width * maxDim) / height);
              height = maxDim;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    const stepAmount = (current, setter, dir) => {

      if (cur >= 10000) step = 1000;
      else if (cur >= 1000) step = 100;
      else if (cur >= 100) step = 10;
      const next = Math.max(0, cur + dir * step);
      setter(String(next));
    };

    // ── Debt Engine ──────────────────────────────────────────────
    function calcBalances(members, expenses, settlements, rates, base) {
      const bal = {};
      members.forEach(m => { bal[m.id] = 0; });
      expenses.forEach(exp => {
        const total = convert(exp.amount, exp.currency, base, rates);
        if (bal[exp.paidBy] !== undefined) bal[exp.paidBy] += total;
        Object.entries(exp.splits).forEach(([mid, share]) => {
          if (bal[mid] !== undefined)
            bal[mid] -= convert(share, exp.currency, base, rates);
        });
      });
      settlements.forEach(s => {
        const a = convert(s.amount, s.currency, base, rates);
        if (bal[s.from] !== undefined) bal[s.from] += a;
        if (bal[s.to]   !== undefined) bal[s.to]   -= a;
      });
      return bal;
    }

    function simplify(balances) {
      const pos = [], neg = [];
      Object.entries(balances).forEach(([id, b]) => {
        if (b >  0.005) pos.push({ id, amt: b });
        if (b < -0.005) neg.push({ id, amt: -b });
      });
      pos.sort((a,b) => b.amt - a.amt);
      neg.sort((a,b) => b.amt - a.amt);
      const debts = [];
      let i = 0, j = 0;
      while (i < pos.length && j < neg.length) {
        const c = pos[i], d = neg[j];
        const a = Math.min(c.amt, d.amt);
        if (a > 0.005) debts.push({ from: d.id, to: c.id, amount: a });
        c.amt -= a; d.amt -= a;
        if (c.amt < 0.005) i++;
        if (d.amt < 0.005) j++;
      }
      return debts;
    }

    // ── Line Chart ───────────────────────────────────────────────
    function LineChart({ data, color, activeIdx, onHover }) {
      const svgRef = useRef(null);
      if (!data || data.length < 2) return null;
      const W = 300, H = 80, pad = 4;
      const vals = data.map(d => d.value);
      const min = Math.min(...vals), max = Math.max(...vals);
      const range = max - min || 0.0001;
      const pts = data.map((d, i) => {
        const x = pad + (i / (data.length - 1)) * (W - 2 * pad);
        const y = H - pad - ((d.value - min) / range) * (H - 2 * pad);
        return [x, y];
      });
      const poly = pts.map(([x, y]) => `${x},${y}`).join(' ');
      const area = `M ${pts[0][0]},${pts[0][1]} ` +
        pts.slice(1).map(([x, y]) => `L ${x},${y}`).join(' ') +
        ` L ${pts[pts.length-1][0]},${H} L ${pts[0][0]},${H} Z`;
      const gid = `g${color.replace(/\W/g,'')}`;

      const ap = (activeIdx !== null && activeIdx >= 0 && activeIdx < pts.length) ? pts[activeIdx] : null;

      const hitPos = (clientX) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        onHover && onHover(Math.round(pct * (data.length - 1)));
      };

      return (
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} className="w-full" preserveAspectRatio="none"
          style={{height: 80, touchAction: 'none', cursor: 'crosshair'}}
          onMouseMove={e => hitPos(e.clientX)}
          onMouseLeave={() => onHover && onHover(null)}
          onTouchStart={e => hitPos(e.touches[0].clientX)}
          onTouchMove={e => { e.preventDefault(); hitPos(e.touches[0].clientX); }}
          onTouchEnd={() => onHover && onHover(null)}>
          <defs>
            <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={area} fill={`url(#${gid})`}/>
          <polyline points={poly} fill="none" stroke={color} strokeWidth="1.8"
            strokeLinecap="round" strokeLinejoin="round"/>
          {ap ? (
            <>
              <line x1={ap[0]} y1={pad} x2={ap[0]} y2={H - pad}
                stroke={color} strokeWidth="1" strokeDasharray="3,3" opacity="0.7"/>
              <circle cx={ap[0]} cy={ap[1]} r="4" fill={color} stroke="white" strokeWidth="2"/>
            </>
          ) : (
            <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color} stroke="white" strokeWidth="1.5"/>
          )}
        </svg>
      );
    }

    // ── Root App ─────────────────────────────────────────────────
    function App() {
      const [groups, setGroups] = useState(() => {
        try { const s = localStorage.getItem('spliteasy'); return s ? JSON.parse(s) : makeSample(); }
        catch { return makeSample(); }
      });
      const [prefs, setPrefs]     = useState(loadPrefs);
      const [favorites, setFavorites] = useState(() => {
        try { return new Set(JSON.parse(localStorage.getItem('spliteasy-fav') || '[]')); }
        catch { return new Set(); }
      });
      const [order, setOrder] = useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('spliteasy-order') || '[]');
          return Array.isArray(saved) ? saved : [];
        } catch { return []; }
      });
      const [alerts, setAlerts] = useState(() => {
        try {
          const s = localStorage.getItem('spliteasy-alerts');
          return s ? JSON.parse(s) : [];
        } catch { return []; }
      });
      const [user, setUser]       = useState(null);
      const [authReady, setAuthReady] = useState(false);
      const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | error
      const [lastSync, setLastSync] = useState(null);
      const initialSyncDone = useRef(false);
      const [view, setView]       = useState('home');
      const [gid, setGid]         = useState(null);
      const [rates, setRates]     = useState({});
      const [rateLoad, setRL]     = useState(true);
      const [rateErr, setRE]      = useState(false);
      const [rateTs, setRateTs]   = useState(null);
      const [toast, setToast]     = useState(null);
      const [tab, setTab]         = useState('expenses');
      const [mAddGrp, setAddGrp]  = useState(false);
      const [mAddExp, setAddExp]  = useState(false);
      const [mAddMem, setAddMem]  = useState(false);
      const [mSettle, setSettle]  = useState(null);

      const group = groups.find(g => g.id === gid);

      useEffect(() => { localStorage.setItem('spliteasy', JSON.stringify(groups)); }, [groups]);
      useEffect(() => { savePrefs(prefs); }, [prefs]);
      useEffect(() => { localStorage.setItem('spliteasy-fav', JSON.stringify([...favorites])); }, [favorites]);
      useEffect(() => { localStorage.setItem('spliteasy-order', JSON.stringify(order)); }, [order]);
      useEffect(() => { localStorage.setItem('spliteasy-alerts', JSON.stringify(alerts)); }, [alerts]);
      const updatePrefs = (patch) => setPrefs(p => ({ ...p, ...patch }));

      // ── Auth state listener ──
      useEffect(() => {
        let mounted = true;
        sb.auth.getSession().then(({ data }) => {
          if (!mounted) return;
          setUser(data.session?.user || null);
          setAuthReady(true);
        });
        const { data: sub } = sb.auth.onAuthStateChange((event, session) => {
          if (!mounted) return;
          setUser(session?.user || null);
          if (event === 'SIGNED_IN')  toast_('Signed in');
          if (event === 'SIGNED_OUT') { toast_('Signed out'); initialSyncDone.current = false; setLastSync(null); }
        });
        return () => { mounted = false; sub.subscription.unsubscribe(); };
      }, []);

      // ── Initial cloud sync on sign-in ──
      useEffect(() => {
        if (!user) return;
        let cancelled = false;
        (async () => {
          setSyncStatus('syncing');
          const { data, error } = await sb
            .from('user_data')
            .select('data, updated_at')
            .eq('user_id', user.id)
            .maybeSingle();
          if (cancelled) return;
          if (error) {
            setSyncStatus('error');
            toast_('Sync error: ' + error.message, 'err');
            initialSyncDone.current = true;
            return;
          }
          const cloudHasData = data && data.data && data.data.groups && data.data.groups.length > 0;
          if (cloudHasData) {
            setGroups(data.data.groups);
            if (data.data.prefs)     setPrefs(p => ({ ...p, ...data.data.prefs }));
            if (Array.isArray(data.data.favorites)) setFavorites(new Set(data.data.favorites));
            if (Array.isArray(data.data.order))     setOrder(data.data.order);
            if (Array.isArray(data.data.alerts))    setAlerts(data.data.alerts);
            setLastSync(new Date(data.updated_at));
            toast_('Loaded from cloud');
          } else {
            // First-time sign in OR cloud was empty → push local up
            const payload = buildSyncPayload();
            const { error: upErr } = await sb
              .from('user_data')
              .upsert({ user_id: user.id, data: payload, updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
            if (!cancelled) {
              if (upErr) { setSyncStatus('error'); toast_('Upload error: ' + upErr.message, 'err'); }
              else { setLastSync(new Date()); toast_('Backed up to cloud'); }
            }
          }
          initialSyncDone.current = true;
          setSyncStatus('idle');
        })();
        return () => { cancelled = true; };
      }, [user]);

      const buildSyncPayload = () => ({
        version: 1,
        groups,
        prefs,
        favorites: [...favorites],
        order,
        alerts,
      });

      // ── Debounced push on data change ──
      useEffect(() => {
        if (!user || !initialSyncDone.current) return;
        setSyncStatus('syncing');
        const t = setTimeout(async () => {
          const { error } = await sb
            .from('user_data')
            .upsert({ user_id: user.id, data: buildSyncPayload(), updated_at: new Date().toISOString() }, { onConflict: 'user_id' });
          if (error) { setSyncStatus('error'); }
          else { setSyncStatus('idle'); setLastSync(new Date()); }
        }, 1200);
        return () => clearTimeout(t);
      }, [groups, prefs, favorites, order, alerts, user]);

      // ── Alert checker: fires when rates load + each time rates change ──
      useEffect(() => {
        if (!rates || !Object.keys(rates).length || !alerts.length) return;
        const now = Date.now();
        const triggered = [];
        setAlerts(prev => prev.map(a => {
          if (a.paused) return a;
          // Cool-down: only refire after 12h
          if (a.lastTriggered && now - new Date(a.lastTriggered).getTime() < 12 * 3600 * 1000) return a;
          const rate = convert(1, a.baseCur, a.targetCur, rates);
          if (!rate) return a;
          const hit = a.direction === 'above' ? rate >= a.threshold : rate <= a.threshold;
          if (hit) {
            triggered.push({ ...a, currentRate: rate });
            return { ...a, lastTriggered: new Date().toISOString() };
          }
          return a;
        }));
        triggered.forEach(a => {
          toast_(`🔔 1 ${a.baseCur} = ${fmtRate(a.currentRate)} ${a.targetCur} (target: ${a.direction === 'above' ? '≥' : '≤'} ${fmtRate(a.threshold)})`, 'ok');
        });
      }, [rates]);

      const loadRates = useCallback(async () => {
        setRL(true); setRE(false);
        try {
          // exchangerate-api.com: free, no redirect, proper CORS, USD base
          const r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
          if (!r.ok) throw new Error();
          const d = await r.json();
          setRates({ ...d.rates, USD: 1 });
          setRateTs(new Date());
        } catch {
          setRE(true);
          setRates(FALLBACK_RATES);
        } finally { setRL(false); }
      }, []);

      useEffect(() => { loadRates(); }, [loadRates]);

      const toast_ = (msg, type='ok') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 2800);
      };

      const addGroup = g => {
        setGroups(p => [...p, { ...g, id: uid(), expenses:[], settlements:[] }]);
        toast_(`Trip "${g.name}" created`);
      };
      const delGroup = id => {
        setGroups(p => p.filter(g => g.id !== id));
        if (gid === id) { setView('home'); setGid(null); }
        toast_('Trip deleted');
      };
      const addMember = mem => {
        setGroups(p => p.map(g => g.id === gid ? { ...g, members:[...g.members, {...mem, id:uid()}] } : g));
        toast_(`${mem.name} added`);
      };
      const addExpense = exp => {
        setGroups(p => p.map(g => g.id === gid
          ? { ...g, expenses:[...g.expenses, {...exp, id:uid(), date:new Date().toISOString()}] } : g));
        toast_('Expense added');
      };
      const delExpense = eid => {
        setGroups(p => p.map(g => g.id === gid
          ? { ...g, expenses: g.expenses.filter(e => e.id !== eid) } : g));
        toast_('Expense removed');
      };
      const addSettlement = s => {
        setGroups(p => p.map(g => g.id === gid
          ? { ...g, settlements:[...g.settlements, {...s, id:uid(), date:new Date().toISOString()}] } : g));
        toast_('Settlement recorded');
      };

      const openGroup = id => { setGid(id); setView('group'); setTab('expenses'); };
      const showNav = view === 'home' || view === 'exchange' || view === 'profile';

      const clearAllData = () => {
        if (!confirm('Delete all trips, expenses, watchlist, and alerts? This cannot be undone.')) return;
        setGroups([]);
        setFavorites(new Set());
        setOrder([]);
        setAlerts([]);
        toast_('All data cleared');
      };
      const importData = (data) => {
        try {
          if (!Array.isArray(data?.groups)) throw new Error('Invalid file');
          setGroups(data.groups);
          if (Array.isArray(data.favorites)) setFavorites(new Set(data.favorites));
          if (Array.isArray(data.order))     setOrder(data.order);
          if (Array.isArray(data.alerts))    setAlerts(data.alerts);
          if (data.prefs)                    setPrefs(p => ({ ...p, ...data.prefs }));
          toast_('Data imported');
        } catch { toast_('Could not read file', 'err'); }
      };

      // ── Alert helpers ──
      const addAlert = (a) => setAlerts(p => [...p, { ...a, id: uid(), createdAt: new Date().toISOString(), lastTriggered: null }]);
      const removeAlert = (id) => setAlerts(p => p.filter(a => a.id !== id));
      const toggleAlertPause = (id) => setAlerts(p => p.map(a => a.id === id ? { ...a, paused: !a.paused } : a));

      // ── Auth helpers ──
      const sendMagicLink = async (email) => {
        const redirectTo = window.location.origin + window.location.pathname;
        const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: redirectTo } });
        if (error) { toast_(error.message || 'Sign-in failed', 'err'); return false; }
        return true;
      };
      const signOut = async () => {
        const { error } = await sb.auth.signOut();
        if (error) toast_(error.message || 'Sign-out failed', 'err');
      };

      return (
        <div className="min-h-screen min-h-[100dvh] bg-[#F5F2F0]">
          {view === 'home' && (
            <HomeView groups={groups} rates={rates} rateLoad={rateLoad} rateErr={rateErr}
              onRefresh={loadRates} onOpen={openGroup}
              onNew={() => setAddGrp(true)} onDel={delGroup} />
          )}
          {view === 'group' && group && (
            <GroupView group={group} rates={rates} tab={tab} onTab={setTab}
              onBack={() => setView('home')}
              onAddExp={() => setAddExp(true)}
              onAddMem={() => setAddMem(true)}
              onDelExp={delExpense}
              onSettle={debt => setSettle(debt)} />
          )}
          {view === 'exchange' && (
            <ExchangeView rates={rates} rateLoad={rateLoad} rateErr={rateErr}
              rateTs={rateTs} onRefresh={loadRates} prefs={prefs}
              favorites={favorites} setFavorites={setFavorites}
              order={order} setOrder={setOrder}
              alerts={alerts} onAddAlert={addAlert} onRemoveAlert={removeAlert} />
          )}
          {view === 'profile' && (
            <ProfileView groups={groups} prefs={prefs} onUpdatePrefs={updatePrefs}
              onClearData={clearAllData} onImport={importData}
              user={user} authReady={authReady} onSendMagicLink={sendMagicLink} onSignOut={signOut}
              syncStatus={syncStatus} lastSync={lastSync}
              alerts={alerts} onRemoveAlert={removeAlert} onToggleAlertPause={toggleAlertPause} />
          )}

          {showNav && <BottomNav view={view} onNav={setView}/>}

          {mAddGrp && <AddGroupModal prefs={prefs} onClose={() => setAddGrp(false)} onAdd={addGroup}/>}
          {mAddMem && group && <AddMemberModal group={group} onClose={() => setAddMem(false)} onAdd={addMember}/>}
          {mAddExp && group && <AddExpenseModal group={group} rates={rates} onClose={() => setAddExp(false)} onAdd={addExpense}/>}
          {mSettle && group && <SettleUpModal group={group} debt={mSettle} onClose={() => setSettle(null)} onSettle={addSettlement}/>}

          {toast && (
            <div className={`fixed bottom-20 left-1/2 -translate-x-1/2 z-[100] px-5 py-3 rounded-2xl shadow-xl text-white text-sm font-medium
              ${toast.type === 'err' ? 'bg-red-500' : 'bg-gray-900'}`}>
              {toast.msg}
            </div>
          )}
        </div>
      );
    }

    // ── Exchange View ────────────────────────────────────────────
    function ExchangeView({ rates, rateLoad, rateErr, rateTs, onRefresh, prefs, favorites, setFavorites, order, setOrder, alerts, onAddAlert, onRemoveAlert }) {
      const [alertModalFor, setAlertModalFor] = useState(null); // { baseCur, targetCur }
      const defaultFrom = prefs?.defaultCurrency || 'GBP';
      const [fromCur, setFrom]       = useState(defaultFrom);
      const [toCur, setTo]           = useState(defaultFrom === 'HKD' ? 'GBP' : 'HKD');
      const [amount, setAmount]      = useState('100');
      const [yRates, setYRates]      = useState({});
      const [selectedWatchCur, setSelectedWatchCur] = useState(null);
      const [chartRange, setChartRange] = useState('1M');
      const [chartData, setChartData]   = useState([]);
      const [chartLoad, setChartLoad]   = useState(false);
      const [chartActiveIdx, setChartActiveIdx] = useState(null);
      const [search, setSearch]      = useState('');
      const [watchAmt, setWatchAmt]  = useState('100');
      const [watchCur, setWatchCur]  = useState(defaultFrom);

      // Merge new currencies into order if any are missing
      const mergedOrder = useMemo(() => {
        const codes = CURRENCIES.map(c => c.code);
        const valid = order.filter(c => codes.includes(c));
        const missing = codes.filter(c => !valid.includes(c));
        return [...valid, ...missing];
      }, [order]);

      const toggleFav = (code, e) => {
        e.stopPropagation();
        setFavorites(prev => {
          const next = new Set(prev);
          next.has(code) ? next.delete(code) : next.add(code);
          return next;
        });
      };

      // Move a favorited currency up or down in the watchlist (swaps with the
      // adjacent favorite, not the adjacent currency in the global order list)
      const moveWatchItem = (code, dir) => {
        setOrder(prev => {
          const allCodes = CURRENCIES.map(c => c.code);
          const valid = prev.filter(c => allCodes.includes(c));
          const missing = allCodes.filter(c => !valid.includes(c));
          const list = [...valid, ...missing];
          const favList = list.filter(c => favorites.has(c));
          const favIdx = favList.indexOf(code);
          if (favIdx === -1) return prev;
          const swapWith = favList[favIdx + dir];
          if (!swapWith) return prev;
          const a = list.indexOf(code);
          const b = list.indexOf(swapWith);
          [list[a], list[b]] = [list[b], list[a]];
          return list;
        });
      };

      // Fetch historical chart for selected watchlist pair
      const RANGE_DAYS = { '1W': 7, '1M': 30, '3M': 90, '1Y': 365, '5Y': 1825 };

      useEffect(() => {
        if (!selectedWatchCur || selectedWatchCur === watchCur) { setChartData([]); return; }
        let cancelled = false;
        setChartLoad(true);
        setChartActiveIdx(null);
        (async () => {
          try {
            const days  = RANGE_DAYS[chartRange];
            const end   = isoDate(new Date());
            const start = isoDate(new Date(Date.now() - days * 864e5));
            const r = await fetch(`https://api.frankfurter.dev/v1/${start}..${end}?from=${watchCur}&to=${selectedWatchCur}`);
            const d = await r.json();
            if (!cancelled) {
              let pts = Object.entries(d.rates || {})
                .map(([date, rv]) => ({ date, value: rv[selectedWatchCur] }))
                .sort((a, b) => a.date.localeCompare(b.date));
              // Subsample for long ranges to keep the chart snappy
              if (pts.length > 300) {
                const step = Math.ceil(pts.length / 200);
                pts = pts.filter((_, i) => i % step === 0 || i === pts.length - 1);
              }
              setChartData(pts);
            }
          } catch { if (!cancelled) setChartData([]); }
          finally  { if (!cancelled) setChartLoad(false); }
        })();
        return () => { cancelled = true; };
      }, [selectedWatchCur, watchCur, chartRange]);

      // Fetch yesterday rates for % change (Frankfurter with explicit USD base)
      useEffect(() => {
        (async () => {
          try {
            const d = new Date(Date.now() - 2 * 864e5);
            const r = await fetch(`https://api.frankfurter.dev/v1/${isoDate(d)}?from=USD`);
            const data = await r.json();
            setYRates({ ...data.rates, USD: 1 });
          } catch {}
        })();
      }, []);

      const numAmt    = parseFloat(amount) || 0;
      const converted = useMemo(() => convert(numAmt, fromCur, toCur, rates), [numAmt, fromCur, toCur, rates]);
      const rate      = useMemo(() => convert(1, fromCur, toCur, rates), [fromCur, toCur, rates]);
      const rateInv   = rate ? 1 / rate : 0;

      const swap = () => { setFrom(toCur); setTo(fromCur); };

      const fromCurObj = getCur(fromCur);
      const toCurObj   = getCur(toCur);

      // Market data: each currency vs USD
      const marketRows = useMemo(() => {
        if (!rates || !Object.keys(rates).length) return [];
        return CURRENCIES.map(c => {
          const rVsUsd  = c.code === 'USD' ? 1 : rates.USD / (rates[c.code] || 1);
          const yVsUsd  = yRates.USD && c.code !== 'USD' ? yRates.USD / (yRates[c.code] || 1) : null;
          const change  = yVsUsd ? (rVsUsd - yVsUsd) / yVsUsd * 100 : null;
          return { ...c, rVsUsd, change };
        });
      }, [rates, yRates]);

      const isSearching = search.trim().length > 0;

      // Search results: any of the 40 currencies matching the query
      const searchResults = useMemo(() => {
        const q = search.trim().toLowerCase();
        if (!q) return [];
        return marketRows.filter(c =>
          c.code.toLowerCase().includes(q) ||
          c.name.toLowerCase().includes(q) ||
          (c.keywords || '').includes(q)
        );
      }, [marketRows, search]);

      // Watchlist: only favorited currencies in custom drag order
      const watchlist = useMemo(() => {
        const d = marketRows.filter(c => favorites.has(c.code));
        d.sort((a, b) => mergedOrder.indexOf(a.code) - mergedOrder.indexOf(b.code));
        return d;
      }, [marketRows, favorites, mergedOrder]);

      const watchNumAmt = parseFloat(watchAmt) || 0;

      const QUICK = [10, 50, 100, 500, 1000];
      const showProviders = !rateLoad && rate > 0 && fromCur !== toCur && numAmt > 0;

      return (
        <div className="max-w-lg mx-auto pb-24">
          {/* Header */}
          <div className="px-4 pt-12 pb-2">
            <div className="app-header rounded-2xl px-5 py-3.5 flex items-center justify-between">
              <div className="flex items-center gap-3 relative z-10">
                <div className="app-logo" style={{background: 'linear-gradient(135deg, #B8E0E5, #8EDCE6)'}}>
                  <ExchangeIco size={14} cls="text-[#2a1f15]"/>
                </div>
                <div>
                  <h1 className="text-base font-bold text-white tracking-tight leading-tight">Currency Exchange</h1>
                  <p className="text-[#D5DCF9] text-[11px] leading-tight opacity-90">
                    {rateLoad ? 'Loading rates…' : rateErr ? 'Using fallback rates' : `Updated ${rateTs ? rateTs.toLocaleTimeString() : '…'}`}
                  </p>
                </div>
              </div>
              <button onClick={onRefresh} aria-label="Refresh rates"
                className="p-2 hover:bg-white/10 rounded-xl transition-colors relative z-10 focus:outline-none focus:ring-2 focus:ring-white/50">
                <RefreshIco size={17} cls={rateLoad ? 'text-white animate-spin' : 'text-white'}/>
              </button>
            </div>
          </div>

          <div className="px-4 py-3 space-y-4">
            {/* ── Converter + Provider Card ── */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div className="p-5">
              {/* From */}
              <div className="bg-gray-50 rounded-2xl p-4 mb-2 relative">
                <div className="flex items-center justify-between mb-2">
                  <p className="text-[11px] font-bold text-gray-600 uppercase tracking-wider">You send</p>
                  <CurrencyPicker value={fromCur} onChange={setFrom} ariaLabel="Currency you're sending"/>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => stepAmount(amount, setAmount, -1)}
                    aria-label="Decrease amount"
                    className="w-9 h-9 rounded-full bg-white border border-gray-200 text-gray-700 font-bold text-lg flex items-center justify-center hover:bg-gray-100 active:scale-95 transition-all shrink-0">−</button>
                  <input type="number" value={amount} onChange={e => setAmount(e.target.value)}
                    min="0" placeholder="0" inputMode="decimal"
                    aria-label="Amount to convert"
                    className="no-spin flex-1 bg-transparent text-3xl font-bold text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#725E54] focus:ring-offset-2 focus:ring-offset-gray-50 rounded-lg tabular-nums text-center min-w-0"/>
                  <button onClick={() => stepAmount(amount, setAmount, +1)}
                    aria-label="Increase amount"
                    className="w-9 h-9 rounded-full bg-white border border-gray-200 text-gray-700 font-bold text-lg flex items-center justify-center hover:bg-gray-100 active:scale-95 transition-all shrink-0">+</button>
                </div>
                <p className="text-xs text-gray-600 truncate mt-1 text-center">{fromCurObj?.symbol} {fromCurObj?.name}</p>
              </div>

              {/* Quick amounts */}
              <div className="flex gap-1.5 mb-2">
                {QUICK.map(q => (
                  <button key={q} onClick={() => setAmount(String(q))}
                    className={`flex-1 py-1.5 text-xs font-semibold rounded-lg border transition-all ${
                      amount === String(q) ? 'bg-[#725E54] text-white border-[#725E54]' : 'border-gray-200 text-gray-500 hover:border-[#8EDCE6]'
                    }`}>
                    {q}
                  </button>
                ))}
              </div>

              {/* Swap */}
              <div className="flex justify-center -my-1 relative z-10">
                <button onClick={swap}
                  className="w-11 h-11 border-4 border-[#F5F2F0] rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-[#8EDCE6]"
                  style={{ backgroundColor: '#725E54' }}
                  aria-label="Swap currencies">
                  <SwapIco size={18} cls="text-white"/>
                </button>
              </div>

              {/* To — hero card */}
              <div className="bg-gradient-to-br from-[#EEF0FC] to-[#D5DCF9] rounded-2xl p-4">
                <div className="flex items-center justify-between mb-2">
                  <p className="text-[11px] font-bold text-[#725E54] uppercase tracking-wider">You receive</p>
                  <CurrencyPicker value={toCur} onChange={setTo} variant="pill-dark" ariaLabel="Currency you'll receive"/>
                </div>
                {rateLoad ? (
                  <div className="h-10 bg-white/50 rounded-lg animate-pulse"/>
                ) : (
                  <p className="text-4xl font-bold text-[#443627] tabular-nums tracking-tight">
                    {toCurObj?.symbol}
                    {fromCur === toCur ? numAmt.toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2})
                      : (toCur === 'JPY' || toCur === 'KRW')
                        ? Math.round(converted).toLocaleString()
                        : converted.toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2})}
                  </p>
                )}
                <p className="text-xs text-[#725E54]/70 truncate mt-0.5">{toCurObj?.name}</p>
              </div>

              {/* Rate info with daily trend */}
              {!rateLoad && rate > 0 && fromCur !== toCur && (() => {
                const yRate = (yRates[fromCur] && yRates[toCur])
                  ? yRates[toCur] / yRates[fromCur] : null;
                const change = yRate ? (rate - yRate) / yRate * 100 : null;
                const up = change !== null && change > 0.01;
                const dn = change !== null && change < -0.01;
                return (
                  <div className="mt-4 pt-4 border-t border-gray-100 flex items-start justify-between gap-2">
                    <div>
                      <p className="text-sm text-gray-700">
                        1 <span className="font-bold">{fromCur}</span> = <span className="font-bold text-gray-900">{fmtRate(rate)} {toCur}</span>
                        {change !== null && (
                          <span className={`ml-1.5 inline-flex items-center gap-0.5 text-xs font-bold ${up ? 'text-emerald-600' : dn ? 'text-rose-600' : 'text-gray-500'}`}>
                            {up ? '▲' : dn ? '▼' : '−'} {Math.abs(change).toFixed(2)}%
                          </span>
                        )}
                      </p>
                      <p className="text-xs text-gray-500 mt-0.5">
                        1 {toCur} = {fmtRate(rateInv)} {fromCur} · vs yesterday
                      </p>
                    </div>
                    <div className="flex items-center gap-1 text-xs text-gray-600 shrink-0 bg-gray-50 px-2 py-1 rounded-full">
                      <GlobeIco size={11}/>Mid-market
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* ── Provider Comparison (same card, separated by border) ── */}
            {showProviders && (
              <div className="border-t border-gray-100 p-5">
                <div className="flex items-center justify-between mb-4">
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-wider">Provider Comparison</p>
                  <span className="text-xs text-gray-500">
                    Sending {fromCurObj?.symbol}{numAmt.toLocaleString()} {fromCur}
                  </span>
                </div>
                {(() => {
                  const bestProvider  = [...PROVIDERS].filter(p => p.id !== 'bank').sort((a, b) => a.pct - b.pct)[0];
                  const worstProvider = [...PROVIDERS].sort((a, b) => b.pct - a.pct)[0];
                  const bestReceived = converted * (1 - bestProvider.pct / 100);
                  const worstReceived = converted * (1 - worstProvider.pct / 100);
                  const savingVsWorst = bestReceived - worstReceived;
                  const fmtAmt = v => (toCur === 'JPY' || toCur === 'KRW')
                    ? `${toCurObj?.symbol}${Math.round(v).toLocaleString()}`
                    : `${toCurObj?.symbol}${v.toLocaleString(undefined, {minimumFractionDigits:2,maximumFractionDigits:2})}`;
                  return (
                    <>
                      {/* Recommendation banner */}
                      <div className="bg-gradient-to-br from-emerald-50 to-emerald-100/60 rounded-xl px-3.5 py-3 mb-3 border border-emerald-200/50">
                        <div className="flex items-center gap-2.5">
                          <ProviderLogo p={bestProvider} size={8}/>
                          <div className="flex-1 min-w-0">
                            <p className="text-sm font-bold text-emerald-800 leading-tight">
                              Use {bestProvider.name}
                            </p>
                            <p className="text-[11px] text-emerald-700 leading-tight mt-0.5">
                              Best rate for this corridor
                            </p>
                          </div>
                          <div className="text-right shrink-0">
                            <p className="text-[10px] font-bold text-emerald-700 uppercase tracking-wider">You save</p>
                            <p className="text-base font-bold text-emerald-700 tabular-nums leading-tight">{fmtAmt(savingVsWorst)}</p>
                          </div>
                        </div>
                        <p className="text-[11px] text-emerald-700/80 mt-2 pt-2 border-t border-emerald-200/50">
                          vs {worstProvider.name} ({worstProvider.pct}% markup)
                        </p>
                      </div>

                      {/* Mid-market reference row */}
                      <div className="flex items-center justify-between py-2 mb-1 border-b border-dashed border-gray-200">
                        <div className="flex items-center gap-2.5">
                          <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center">
                            <GlobeIco size={14} cls="text-gray-600"/>
                          </div>
                          <div>
                            <p className="text-xs font-bold text-gray-700">Google / XE Rate</p>
                            <p className="text-[11px] text-gray-500">True mid-market · no one gives you this</p>
                          </div>
                        </div>
                        <p className="text-sm font-bold text-gray-700 tabular-nums">{fmtAmt(converted)}</p>
                      </div>

                      {/* Provider rows */}
                      {PROVIDERS.map(p => {
                        const received = converted * (1 - p.pct / 100);
                        const fee = converted - received;
                        const isBest = p.id === bestProvider.id;
                        const isBank = p.id === 'bank';
                        return (
                          <div key={p.id} className={`flex items-center justify-between py-2.5 ${isBank ? 'mt-1 pt-3 border-t border-dashed border-gray-200' : ''}`}>
                            <div className="flex items-center gap-2.5">
                              <ProviderLogo p={p} size={8}/>
                              <div>
                                <div className="flex items-center gap-1.5">
                                  <p className={`text-sm font-bold ${isBank ? 'text-gray-500' : 'text-gray-800'}`}>{p.name}</p>
                                  {isBest && <span className="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded-full">Best</span>}
                                  {isBank && <span className="text-[10px] font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded-full">Avoid</span>}
                                </div>
                                <p className="text-xs text-gray-500">{p.note}</p>
                              </div>
                            </div>
                            <div className="text-right">
                              <p className={`text-sm font-bold tabular-nums ${isBest ? 'text-emerald-700' : isBank ? 'text-amber-600' : 'text-gray-800'}`}>
                                {fmtAmt(received)}
                              </p>
                              <p className={`text-xs ${isBank ? 'text-amber-500 font-semibold' : 'text-gray-500'}`}>−{fmtAmt(fee)} in fees</p>
                            </div>
                          </div>
                        );
                      })}
                    </>
                  );
                })()}
                <p className="text-xs text-gray-500 mt-3 pt-3 border-t border-gray-100 text-center">
                  Estimates only · Actual fees vary by amount, plan, and destination
                </p>
              </div>
            )}
            </div>

            {/* ── Watchlist / Search ── */}
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              {/* Header */}
              <div className="px-5 pt-5 pb-4 space-y-3">
                <div className="flex items-baseline justify-between">
                  <p className="text-base font-bold text-gray-900 tracking-tight">
                    {isSearching ? 'Search Results' : 'My Watchlist'}
                  </p>
                  {!isSearching && watchlist.length > 0 && (
                    <p className="text-xs text-gray-500 font-medium">{watchlist.length} {watchlist.length === 1 ? 'currency' : 'currencies'}</p>
                  )}
                </div>

                {/* Search */}
                <div className="relative">
                  <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                  </svg>
                  <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                    placeholder="Add currency or country…"
                    className="w-full pl-9 pr-8 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-[#8EDCE6] focus:border-transparent placeholder-gray-400"/>
                  {search && (
                    <button onClick={() => setSearch('')}
                      className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-600 text-xl leading-none">×</button>
                  )}
                </div>
              </div>

              <div className="divide-y divide-gray-50">
                {/* Base amount input — sits at top of list, visually flows into rows */}
                {!rateLoad && !isSearching && watchlist.length > 0 && (
                  <div className="bg-gradient-to-r from-[#EEF0FC] to-[#D5DCF9]/70 px-4 py-3">
                    <p className="text-[10px] font-bold text-[#725E54] uppercase tracking-wider mb-1.5">Showing rates for</p>
                    <div className="flex items-center gap-2">
                      <div className="shrink-0">
                        <CurrencyPicker value={watchCur} onChange={setWatchCur} variant="pill-dark" ariaLabel="Base currency for watchlist"/>
                      </div>
                      <button onClick={() => stepAmount(watchAmt, setWatchAmt, -1)}
                        aria-label="Decrease amount"
                        className="w-8 h-8 rounded-full bg-white text-[#443627] font-bold text-lg flex items-center justify-center hover:bg-[#EEF0FC] active:scale-95 transition-all shrink-0 shadow-sm">−</button>
                      <input type="number" value={watchAmt} onChange={e => setWatchAmt(e.target.value)}
                        min="0" placeholder="0" inputMode="decimal"
                        aria-label="Amount to compare"
                        className="no-spin flex-1 bg-transparent text-[#443627] font-bold text-xl focus:outline-none focus:ring-2 focus:ring-[#443627] rounded-lg min-w-0 tabular-nums text-center"/>
                      <button onClick={() => stepAmount(watchAmt, setWatchAmt, +1)}
                        aria-label="Increase amount"
                        className="w-8 h-8 rounded-full bg-white text-[#443627] font-bold text-lg flex items-center justify-center hover:bg-[#EEF0FC] active:scale-95 transition-all shrink-0 shadow-sm">+</button>
                    </div>
                  </div>
                )}
                {/* Loading skeletons */}
                {rateLoad && [...Array(4)].map((_, i) => (
                  <div key={i} className="px-4 py-3.5 flex items-center gap-3">
                    <div className="w-5 shrink-0"/>
                    <div className="w-8 h-8 bg-gray-100 rounded-full animate-pulse shrink-0"/>
                    <div className="flex-1">
                      <div className="w-14 h-3 bg-gray-100 rounded animate-pulse mb-1.5"/>
                      <div className="w-24 h-2 bg-gray-100 rounded animate-pulse"/>
                    </div>
                    <div className="text-right space-y-1.5">
                      <div className="w-20 h-3 bg-gray-100 rounded animate-pulse"/>
                      <div className="w-12 h-2 bg-gray-100 rounded animate-pulse ml-auto"/>
                    </div>
                  </div>
                ))}

                {/* Search results */}
                {!rateLoad && isSearching && (
                  searchResults.length === 0 ? (
                    <div className="px-5 py-10 text-center text-gray-500 text-sm">
                      No results for "{search}"
                    </div>
                  ) : searchResults.map(c => {
                    const hasChange = c.change !== null;
                    const up = hasChange && c.change > 0;
                    const dn = hasChange && c.change < 0;
                    const isFav = favorites.has(c.code);
                    return (
                      <div key={c.code}
                        onClick={() => { setFrom(c.code); setTo('USD'); }}
                        className="px-4 py-3 flex items-center gap-3 hover:bg-[#EEF0FC]/50 transition-colors cursor-pointer select-none">
                        <span className="text-2xl leading-none shrink-0">{c.flag}</span>
                        <div className="flex-1 min-w-0">
                          <p className="font-bold text-gray-900 text-sm">{c.code}</p>
                          <p className="text-xs text-gray-500 truncate">{c.name}</p>
                        </div>
                        <div className="flex items-center gap-3 shrink-0">
                          <div className="text-right">
                            <p className="font-bold text-gray-800 text-sm tabular-nums">{fmtRate(c.rVsUsd)}</p>
                            {hasChange && (
                              <p className={`text-xs font-semibold ${up ? 'text-emerald-500' : dn ? 'text-rose-500' : 'text-gray-500'}`}>
                                {up ? '+' : ''}{c.change.toFixed(2)}%
                              </p>
                            )}
                          </div>
                          <button onClick={e => toggleFav(c.code, e)}
                            className={`w-7 text-center text-xl leading-none transition-all hover:scale-110 active:scale-90 ${isFav ? 'text-[#725E54]' : 'text-gray-200 hover:text-[#725E54]'}`}
                            title={isFav ? 'Remove from watchlist' : 'Add to watchlist'}>★</button>
                        </div>
                      </div>
                    );
                  })
                )}

                {/* Watchlist */}
                {!rateLoad && !isSearching && (
                  watchlist.length === 0 ? (
                    <div className="px-5 py-12 text-center">
                      <div className="w-14 h-14 bg-gradient-to-br from-[#EEF0FC] to-[#D5DCF9] rounded-2xl flex items-center justify-center mx-auto mb-3">
                        <span className="text-2xl">⭐</span>
                      </div>
                      <p className="text-sm font-bold text-gray-700 mb-1">Build your watchlist</p>
                      <p className="text-xs text-gray-500 max-w-[14rem] mx-auto leading-relaxed">Search a currency or country above, then tap ★ to follow live rates and 5-year charts.</p>
                    </div>
                  ) : watchlist.map((c, idx) => {
                    const hasChange = c.change !== null;
                    const up = hasChange && c.change > 0;
                    const dn = hasChange && c.change < 0;
                    const isFirst = idx === 0;
                    const isLast  = idx === watchlist.length - 1;
                    const converted = watchNumAmt > 0 ? convert(watchNumAmt, watchCur, c.code, rates) : null;
                    const fmtConverted = v => {
                      if (v === null) return null;
                      const sym = getCur(c.code)?.symbol || c.code;
                      if (c.code === 'JPY' || c.code === 'KRW' || c.code === 'VND' || c.code === 'IDR')
                        return `${sym}${Math.round(v).toLocaleString()}`;
                      return `${sym}${v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
                    };
                    return (
                    <React.Fragment key={c.code}>
                      <div
                        onClick={() => {
                          setSelectedWatchCur(prev => prev === c.code ? null : c.code);
                          if (selectedWatchCur !== c.code) setChartRange('1M');
                        }}
                        className={`px-2.5 py-3 flex items-center gap-2 transition-colors cursor-pointer select-none ${
                          selectedWatchCur === c.code ? 'bg-[#EEF0FC]/60'
                          : 'hover:bg-[#EEF0FC]/50'
                        }`}>
                        {/* Reorder buttons */}
                        <div className="shrink-0 flex flex-col gap-0.5" onClick={e => e.stopPropagation()}>
                          <button onClick={() => moveWatchItem(c.code, -1)}
                            disabled={isFirst}
                            aria-label={`Move ${c.code} up`}
                            className={`w-6 h-5 flex items-center justify-center rounded-md transition-all ${isFirst ? 'text-gray-200 cursor-not-allowed' : 'text-gray-500 hover:text-[#725E54] hover:bg-[#EEF0FC] active:scale-90'}`}>
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
                          </button>
                          <button onClick={() => moveWatchItem(c.code, +1)}
                            disabled={isLast}
                            aria-label={`Move ${c.code} down`}
                            className={`w-6 h-5 flex items-center justify-center rounded-md transition-all ${isLast ? 'text-gray-200 cursor-not-allowed' : 'text-gray-500 hover:text-[#725E54] hover:bg-[#EEF0FC] active:scale-90'}`}>
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                          </button>
                        </div>
                        <span className="text-2xl leading-none shrink-0">{c.flag}</span>
                        <div className="flex-1 min-w-0">
                          <p className="font-bold text-gray-900 text-sm">{c.code}</p>
                          <p className="text-xs text-gray-500 truncate">{c.name}</p>
                        </div>
                        <div className="flex items-center gap-1.5 shrink-0">
                          <div className="text-right">
                            {converted !== null ? (
                              <>
                                <p className="font-bold text-gray-900 text-base tabular-nums">{fmtConverted(converted)}</p>
                                <p className="text-[10px] text-gray-500 tabular-nums leading-tight">
                                  1 {watchCur} = {fmtRate(convert(1, watchCur, c.code, rates))} {c.code}
                                </p>
                              </>
                            ) : (
                              <p className="font-bold text-gray-500 text-sm tabular-nums">{fmtRate(c.rVsUsd)}</p>
                            )}
                            {hasChange && (
                              <p className={`text-xs font-semibold mt-0.5 ${up ? 'text-emerald-500' : dn ? 'text-rose-500' : 'text-gray-500'}`}>
                                {up ? '+' : ''}{c.change.toFixed(2)}%
                              </p>
                            )}
                          </div>
                          {(() => {
                            const hasAlert = alerts && alerts.some(a => a.baseCur === watchCur && a.targetCur === c.code && !a.paused);
                            return (
                              <button
                                onClick={e => { e.stopPropagation(); setAlertModalFor({ baseCur: watchCur, targetCur: c.code }); }}
                                aria-label={`Set rate alert for ${c.code}`}
                                title="Set rate alert"
                                className={`p-1 rounded-md hover:bg-[#EEF0FC] active:scale-90 transition-all ${hasAlert ? 'text-amber-500' : 'text-gray-300 hover:text-[#725E54]'}`}>
                                <BellIco size={16}/>
                              </button>
                            );
                          })()}
                          <button onClick={e => toggleFav(c.code, e)}
                            aria-label="Remove from watchlist"
                            className="w-7 text-center text-xl leading-none text-[#725E54] hover:scale-110 active:scale-90 transition-all"
                            title="Remove from watchlist">★</button>
                        </div>
                      </div>

                      {/* ── Inline chart panel ── */}
                      {selectedWatchCur === c.code && (() => {
                        const chartTrend = chartData.length > 1
                          ? (chartData[chartData.length-1].value - chartData[0].value) / chartData[0].value * 100
                          : null;
                        const chartUp = chartTrend >= 0;
                        const chartColor = chartUp ? '#10b981' : '#f43f5e';
                        return (
                          <div className="bg-[#F5F2F0] border-t border-gray-100 px-4 pt-3 pb-4" onClick={e => e.stopPropagation()}>
                            {/* Pair + scrubbed value */}
                            <div className="flex items-center justify-between mb-2.5">
                              <div>
                                <p className="text-xs text-gray-500">{watchCur} / {c.code}</p>
                                {chartData.length > 1 && (
                                  <p className="text-lg font-bold text-gray-900 tabular-nums leading-tight">
                                    {fmtRate(chartActiveIdx !== null ? chartData[chartActiveIdx]?.value : chartData[chartData.length-1]?.value)}
                                  </p>
                                )}
                              </div>
                              <div className="text-right">
                                {chartActiveIdx !== null && chartData[chartActiveIdx] ? (
                                  <p className="text-xs text-gray-500">{chartData[chartActiveIdx].date}</p>
                                ) : chartTrend !== null ? (
                                  <span className={`text-sm font-bold ${chartUp ? 'text-emerald-500' : 'text-rose-500'}`}>
                                    {chartUp ? '▲' : '▼'} {Math.abs(chartTrend).toFixed(2)}%
                                  </span>
                                ) : null}
                              </div>
                            </div>
                            {/* Range selector */}
                            <div className="flex gap-1.5 mb-2">
                              {['1W','1M','3M','1Y','5Y'].map(r => (
                                <button key={r} onClick={() => setChartRange(r)}
                                  className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${
                                    chartRange === r
                                      ? 'bg-[#725E54] text-white'
                                      : 'bg-white border border-gray-200 text-gray-500 hover:border-[#8EDCE6]'
                                  }`}>
                                  {r}
                                </button>
                              ))}
                            </div>
                            {/* Chart body */}
                            {chartLoad ? (
                              <div className="h-20 bg-gray-200 rounded-xl animate-pulse"/>
                            ) : chartData.length > 1 ? (
                              <>
                                <LineChart data={chartData} color={chartColor}
                                  activeIdx={chartActiveIdx}
                                  onHover={setChartActiveIdx}/>
                                <div className="flex justify-between text-xs text-gray-500 mt-1">
                                  <span>{chartData[0]?.date}</span>
                                  <span>{chartData[chartData.length-1]?.date}</span>
                                </div>
                              </>
                            ) : (
                              <div className="h-20 flex items-center justify-center text-gray-500 text-xs">No data available</div>
                            )}
                          </div>
                        );
                      })()}
                    </React.Fragment>
                    );
                  })

                )}
              </div>
            </div>
          </div>

          {alertModalFor && (
            <SetAlertModal
              baseCur={alertModalFor.baseCur}
              targetCur={alertModalFor.targetCur}
              rates={rates}
              onClose={() => setAlertModalFor(null)}
              onAdd={(a) => { onAddAlert(a); setAlertModalFor(null); }}
            />
          )}
        </div>
      );
    }

    // ── Set Alert Modal ──────────────────────────────────────────
    function SetAlertModal({ baseCur, targetCur, rates, onClose, onAdd }) {
      const currentRate = useMemo(() => convert(1, baseCur, targetCur, rates), [baseCur, targetCur, rates]);
      const [direction, setDirection] = useState('above');
      const [threshold, setThreshold] = useState(() => {
        if (!currentRate) return '';
        // Suggest +/-2% from current
        return (currentRate * 1.02).toFixed(currentRate < 1 ? 4 : 2);
      });
      const baseObj   = getCur(baseCur);
      const targetObj = getCur(targetCur);
      const numThresh = parseFloat(threshold) || 0;
      const valid     = numThresh > 0 && currentRate > 0;

      const submit = () => {
        if (!valid) return;
        onAdd({ baseCur, targetCur, direction, threshold: numThresh });
      };

      const setSuggested = (pct) => {
        const v = currentRate * (1 + pct / 100);
        setThreshold(v.toFixed(currentRate < 1 ? 4 : 2));
        setDirection(pct > 0 ? 'above' : 'below');
      };

      return (
        <Modal onClose={onClose}>
          <div className="p-6">
            <div className="flex items-center justify-between mb-4">
              <div>
                <h2 className="text-xl font-bold text-gray-900 flex items-center gap-2"><BellIco size={20} cls="text-[#725E54]"/>Set rate alert</h2>
                <p className="text-xs text-gray-500 mt-0.5">We'll notify you when it hits</p>
              </div>
              <button onClick={onClose} aria-label="Close" className="p-2 hover:bg-gray-100 rounded-xl"><XIco size={18} cls="text-gray-500"/></button>
            </div>

            {/* Current rate display */}
            <div className="bg-gradient-to-br from-[#EEF0FC] to-[#D5DCF9]/70 rounded-2xl p-4 mb-4">
              <p className="text-[11px] font-bold text-[#725E54] uppercase tracking-wider">Current rate</p>
              <p className="text-2xl font-bold text-[#443627] tabular-nums leading-tight mt-0.5">
                1 {baseObj?.flag} {baseCur} = {fmtRate(currentRate)} {targetObj?.flag} {targetCur}
              </p>
            </div>

            {/* Direction */}
            <p className="text-sm font-semibold text-gray-700 mb-2">Notify me when 1 {baseCur} is…</p>
            <div className="grid grid-cols-2 gap-2 mb-4">
              <button onClick={() => setDirection('above')}
                className={`py-3 rounded-xl text-sm font-bold transition-all ${direction === 'above' ? 'bg-emerald-500 text-white shadow-sm' : 'bg-white border border-gray-200 text-gray-600'}`}>
                ▲ Above
              </button>
              <button onClick={() => setDirection('below')}
                className={`py-3 rounded-xl text-sm font-bold transition-all ${direction === 'below' ? 'bg-rose-500 text-white shadow-sm' : 'bg-white border border-gray-200 text-gray-600'}`}>
                ▼ Below
              </button>
            </div>

            {/* Threshold */}
            <p className="text-sm font-semibold text-gray-700 mb-2">Target rate</p>
            <div className="bg-gray-50 rounded-2xl p-3 mb-2">
              <div className="flex items-baseline gap-2 mb-1">
                <span className="text-sm text-gray-500">1 {baseCur} =</span>
                <input type="number" value={threshold} onChange={e => setThreshold(e.target.value)}
                  inputMode="decimal" step="any"
                  className="no-spin flex-1 bg-transparent text-2xl font-bold text-gray-900 focus:outline-none tabular-nums min-w-0"/>
                <span className="text-sm font-semibold text-gray-700">{targetCur}</span>
              </div>
              {numThresh > 0 && currentRate > 0 && (
                <p className="text-xs text-gray-500">
                  {((numThresh - currentRate) / currentRate * 100).toFixed(2)}% from current
                </p>
              )}
            </div>

            {/* Quick presets */}
            <div className="grid grid-cols-4 gap-1.5 mb-5">
              {[-5, -2, +2, +5].map(p => (
                <button key={p} onClick={() => setSuggested(p)}
                  className="py-2 text-xs font-bold border border-gray-200 rounded-lg text-gray-600 hover:border-[#725E54] hover:text-[#443627] transition-all">
                  {p > 0 ? '+' : ''}{p}%
                </button>
              ))}
            </div>

            <button onClick={submit} disabled={!valid}
              className="w-full bg-gradient-to-r from-[#443627] to-[#725E54] text-white py-3.5 rounded-xl font-bold hover:shadow-md transition-all disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
              <BellIco size={17}/>Create alert
            </button>
            <p className="text-[11px] text-gray-500 text-center mt-3 leading-snug">
              Alerts fire when you open the app and the rate matches. Cool-down: 12h between re-triggers.
            </p>
          </div>
        </Modal>
      );
    }

    // ── Home View ────────────────────────────────────────────────
    function HomeView({ groups, rates, rateLoad, rateErr, onRefresh, onOpen, onNew, onDel }) {
      const totalOutstanding = useMemo(() => {
        return groups.reduce((s, g) => {
          const bal = calcBalances(g.members, g.expenses, g.settlements, rates, g.currency);
          const debts = simplify(bal);
          return s + debts.reduce((a, d) => a + d.amount, 0);
        }, 0);
      }, [groups, rates]);

      return (
        <div className="max-w-lg mx-auto pb-24">
          <div className="px-4 pt-12 pb-2">
            <div className="app-header rounded-2xl px-5 py-3.5 flex items-center justify-between">
              <div className="flex items-center gap-3 relative z-10">
                <div className="app-logo">S</div>
                <div>
                  <h1 className="text-base font-bold text-white tracking-tight leading-tight">SplitEasy</h1>
                  <p className="text-[#D5DCF9] text-[11px] leading-tight opacity-90">Split expenses, stress-free</p>
                </div>
              </div>
              <div className="relative z-10">
              {rateLoad ? (
                <span className="text-[11px] text-white/90 flex items-center gap-1 bg-white/10 px-2 py-1 rounded-full">
                  <RefreshIco size={11} cls="animate-spin"/>Loading
                </span>
              ) : rateErr ? (
                <button onClick={onRefresh} aria-label="Retry loading rates"
                  className="text-[11px] text-white/90 flex items-center gap-1 hover:text-white transition-colors bg-white/10 px-2 py-1 rounded-full">
                  <RefreshIco size={11}/>Retry
                </button>
              ) : (
                <span className="text-[11px] text-white flex items-center gap-1 bg-emerald-400/20 border border-emerald-300/30 px-2 py-1 rounded-full">
                  <span className="w-1.5 h-1.5 rounded-full bg-emerald-300 animate-pulse"/>Live
                </span>
              )}
              </div>
            </div>
          </div>

          <div className="px-4 py-4">
            <div className="flex items-end justify-between mb-4">
              <div>
                <h2 className="font-bold text-gray-900 text-2xl tracking-tight">Your Trips</h2>
                <p className="text-xs text-gray-500 mt-0.5">
                  {groups.length === 0
                    ? 'Track expenses from anywhere'
                    : `${groups.length} ${groups.length === 1 ? 'trip' : 'trips'}${totalOutstanding > 0.01 ? ' · some unsettled' : ''}`}
                </p>
              </div>
              {groups.length > 0 && (
                <button onClick={onNew}
                  className="flex items-center gap-1.5 bg-[#725E54] text-white px-3.5 py-2 rounded-xl text-sm font-semibold hover:bg-[#443627] transition-colors shadow-sm">
                  <PlusIco size={16}/>New
                </button>
              )}
            </div>

            {groups.length === 0 ? (
              <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
                <div className="w-16 h-16 bg-gradient-to-br from-[#D5DCF9] to-[#EEF0FC] rounded-2xl flex items-center justify-center mx-auto mb-4">
                  <span className="text-3xl">✈️</span>
                </div>
                <p className="text-gray-900 font-bold text-base">Start your first trip</p>
                <p className="text-gray-500 text-sm mt-1 mb-5 leading-relaxed">
                  Add who's going, log expenses in any currency, and we'll work out who owes what.
                </p>
                <button onClick={onNew}
                  className="bg-[#725E54] text-white px-6 py-3 rounded-xl font-semibold hover:bg-[#443627] transition-colors w-full flex items-center justify-center gap-2">
                  <PlusIco size={16}/>Create your first trip
                </button>
                <div className="mt-5 pt-5 border-t border-gray-100">
                  <p className="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-2.5">Common use cases</p>
                  <div className="flex flex-wrap gap-1.5 justify-center">
                    {['🌴 Beach getaway','🏔️ Ski trip','🍽️ Dinner out','🏠 Roommates','🎉 Birthday'].map(t => (
                      <span key={t} className="text-xs text-gray-500 bg-gray-50 px-2.5 py-1 rounded-full">{t}</span>
                    ))}
                  </div>
                </div>
              </div>
            ) : (
              <div className="space-y-3">
                {groups.map(g => <GroupCard key={g.id} group={g} rates={rates} onOpen={() => onOpen(g.id)} onDel={() => onDel(g.id)}/>)}
              </div>
            )}
          </div>
        </div>
      );
    }

    function GroupCard({ group, rates, onOpen, onDel }) {
      const bal   = useMemo(() => calcBalances(group.members, group.expenses, group.settlements, rates, group.currency), [group, rates]);
      const debts = useMemo(() => simplify(bal), [bal]);
      const total = debts.reduce((s, d) => s + d.amount, 0);

      return (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <button className="w-full text-left p-4" onClick={onOpen}>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-gradient-to-br from-[#725E54] to-[#A7B0CA] rounded-xl flex items-center justify-center flex-shrink-0">
                  <UsersIco size={22} cls="text-white"/>
                </div>
                <div>
                  <p className="font-semibold text-gray-900">{group.name}</p>
                  <p className="text-sm text-gray-500">{group.members.length} members · {group.expenses.length} expenses</p>
                </div>
              </div>
              <div className="text-right">
                {total > 0.01 ? (
                  <>
                    <p className="text-xs text-gray-500">outstanding</p>
                    <p className="font-bold text-amber-500">{fmt(total, group.currency)}</p>
                  </>
                ) : (
                  <span className="text-xs font-semibold text-emerald-500 flex items-center gap-1">
                    <CheckIco size={13}/>Settled
                  </span>
                )}
              </div>
            </div>
          </button>
          <div className="px-4 pb-3 border-t border-gray-50 pt-2.5 flex items-center justify-between">
            <div className="flex -space-x-2">
              {group.members.slice(0,5).map(m => (
                <div key={m.id} className={`w-7 h-7 rounded-full ${avatarColor(m.id)} flex items-center justify-center text-white text-xs font-bold border-2 border-white`}>
                  {initials(m.name)}
                </div>
              ))}
              {group.members.length > 5 && (
                <div className="w-7 h-7 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 text-xs font-bold border-2 border-white">
                  +{group.members.length - 5}
                </div>
              )}
            </div>
            <div className="flex items-center gap-2">
              <span className="text-xs text-gray-500 font-medium">{group.currency}</span>
              <button onClick={e => { e.stopPropagation(); if (confirm(`Delete trip "${group.name}"? This removes all its expenses.`)) onDel(); }}
                className="p-1.5 text-gray-300 hover:text-red-400 hover:bg-red-50 rounded-lg transition-colors">
                <TrashIco size={14}/>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── Group View ───────────────────────────────────────────────
    function GroupView({ group, rates, tab, onTab, onBack, onAddExp, onAddMem, onDelExp, onSettle }) {
      const bal   = useMemo(() => calcBalances(group.members, group.expenses, group.settlements, rates, group.currency), [group, rates]);
      const debts = useMemo(() => simplify(bal), [bal]);
      const byId  = id => group.members.find(m => m.id === id);

      return (
        <div className="max-w-lg mx-auto min-h-screen min-h-[100dvh] flex flex-col">
          <div className="px-4 pt-12 pb-2">
            <div className="app-header rounded-2xl px-4 py-3.5">
              <div className="flex items-center gap-2 mb-3 relative z-10">
                <button onClick={onBack} aria-label="Back"
                  className="p-1.5 hover:bg-white/10 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-white/50">
                  <BackIco size={18} cls="text-white"/>
                </button>
                <div className="flex-1 min-w-0">
                  <h1 className="text-base font-bold text-white truncate tracking-tight leading-tight">{group.name}</h1>
                  <p className="text-[#D5DCF9] text-[11px] leading-tight opacity-90">{group.members.length} members · base {group.currency}</p>
                </div>
                <button onClick={onAddMem} aria-label="Add member"
                  className="p-1.5 hover:bg-white/10 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-white/50">
                  <UserPlusIco size={17} cls="text-white"/>
                </button>
              </div>
              <div className="flex flex-wrap gap-2.5 relative z-10">
                {group.members.map(m => (
                  <div key={m.id} className="flex flex-col items-center gap-1">
                    <Avatar member={m} size="md" border/>
                    <span className="text-xs text-[#D5DCF9] max-w-[48px] truncate text-center opacity-90">{m.name.split(' ')[0]}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div className="px-4 mt-3">
            <div className="bg-white rounded-2xl p-1 shadow-sm border border-gray-100 flex gap-1">
              {[
                { id: 'expenses', label: 'Expenses', count: group.expenses.length },
                { id: 'balances', label: 'Balances', count: debts.length },
              ].map(t => {
                const active = tab === t.id;
                return (
                  <button key={t.id} onClick={() => onTab(t.id)}
                    className={`flex-1 py-2.5 px-4 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-1.5 ${
                      active ? 'bg-[#443627] text-white shadow-sm' : 'text-gray-600 hover:text-[#443627] hover:bg-gray-50'
                    }`}>
                    {t.label}
                    {t.count > 0 && (
                      <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full ${
                        active ? 'bg-white/20 text-white' : t.id === 'balances' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-600'
                      }`}>{t.count}</span>
                    )}
                  </button>
                );
              })}
            </div>
          </div>

          <div className="flex-1 overflow-y-auto px-4 py-4 space-y-3">
            {tab === 'expenses' && (
              group.expenses.length === 0 ? (
                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 text-center">
                  <div className="w-14 h-14 bg-gradient-to-br from-[#EEF0FC] to-[#D5DCF9] rounded-2xl flex items-center justify-center mx-auto mb-3">
                    <ReceiptIco size={26} cls="text-[#725E54]"/>
                  </div>
                  <p className="text-gray-900 font-bold">No expenses yet</p>
                  <p className="text-gray-500 text-sm mt-1 mb-4">Log your first expense to start tracking who paid what.</p>
                  <button onClick={onAddExp}
                    className="w-full bg-gradient-to-r from-[#443627] to-[#725E54] text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:shadow-md active:scale-[0.98] transition-all">
                    <PlusIco size={16}/>Add first expense
                  </button>
                </div>
              ) : (
                [...group.expenses].reverse().map(exp => (
                  <ExpenseItem key={exp.id} exp={exp} group={group} rates={rates} onDel={() => onDelExp(exp.id)}/>
                ))
              )
            )}

            {tab === 'balances' && (
              <>
                <div>
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Balances</p>
                  <div className="space-y-2">
                    {group.members.map(m => {
                      const b = bal[m.id] || 0;
                      return (
                        <div key={m.id} className="bg-white rounded-xl p-3 flex items-center justify-between border border-gray-100 shadow-sm">
                          <div className="flex items-center gap-2.5">
                            <Avatar member={m} size="sm"/>
                            <span className="font-medium text-gray-800 text-sm">{m.name}</span>
                          </div>
                          {Math.abs(b) < 0.01 ? (
                            <span className="text-xs text-gray-500">settled up</span>
                          ) : b > 0 ? (
                            <div className="text-right">
                              <p className="text-xs text-gray-500">gets back</p>
                              <p className="font-bold text-emerald-500 text-sm">{fmt(b, group.currency)}</p>
                            </div>
                          ) : (
                            <div className="text-right">
                              <p className="text-xs text-gray-500">owes</p>
                              <p className="font-bold text-rose-500 text-sm">{fmt(-b, group.currency)}</p>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div>
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Suggested payments</p>
                  {debts.length === 0 ? (
                    <div className="bg-emerald-50 rounded-2xl p-5 text-center">
                      <CheckIco size={24} cls="text-emerald-500 mx-auto mb-1"/>
                      <p className="font-semibold text-emerald-700">All settled up!</p>
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {debts.map((d, i) => (
                        <DebtItem key={i} debt={d} group={group} onSettle={() => onSettle(d)}/>
                      ))}
                    </div>
                  )}
                </div>
                {group.settlements.length > 0 && (
                  <div>
                    <p className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Payment history</p>
                    <div className="space-y-2">
                      {[...group.settlements].reverse().map(s => {
                        const f = byId(s.from), t = byId(s.to);
                        return (
                          <div key={s.id} className="bg-white rounded-xl p-3 flex items-center justify-between border border-gray-100 shadow-sm">
                            <div className="flex items-center gap-2 text-sm">
                              <span className="font-medium text-gray-700">{f?.name}</span>
                              <ArrIco size={13} cls="text-gray-300"/>
                              <span className="font-medium text-gray-700">{t?.name}</span>
                              {s.note && <span className="text-gray-500 text-xs">· {s.note}</span>}
                            </div>
                            <div className="text-right">
                              <p className="font-semibold text-emerald-600 text-sm">{fmt(s.amount, s.currency)}</p>
                              <p className="text-xs text-gray-500">{new Date(s.date).toLocaleDateString()}</p>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>

          <div className="sticky bottom-0 px-4 pt-3 pb-3 bg-gradient-to-t from-[#F5F2F0] via-[#F5F2F0]/95 to-transparent" style={{ paddingBottom: 'calc(0.75rem + env(safe-area-inset-bottom))' }}>
            <button onClick={onAddExp}
              className="w-full bg-gradient-to-r from-[#443627] to-[#725E54] text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-2 hover:shadow-lg active:scale-[0.98] transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-[#8EDCE6] focus:ring-offset-2 focus:ring-offset-[#F5F2F0]">
              <PlusIco size={20}/>Add Expense
            </button>
          </div>
        </div>
      );
    }

    function ExpenseItem({ exp, group, rates, onDel }) {
      const [open, setOpen]       = useState(false);
      const [viewReceipt, setViewReceipt] = useState(false);
      const payer  = group.members.find(m => m.id === exp.paidBy);
      const inBase = useMemo(() =>
        exp.currency !== group.currency ? convert(exp.amount, exp.currency, group.currency, rates) : null,
        [exp, group.currency, rates]
      );
      return (
        <>
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden hover:shadow-md transition-shadow">
          <button onClick={() => setOpen(v => !v)}
            className="w-full p-3.5 flex items-center gap-3 text-left focus:outline-none focus:bg-gray-50/50">
            {exp.receipt ? (
              <div className="w-10 h-10 rounded-xl overflow-hidden flex-shrink-0 shadow-sm border border-gray-200">
                <img src={exp.receipt} alt="Receipt" className="w-full h-full object-cover"/>
              </div>
            ) : (
              <div className="w-10 h-10 bg-gradient-to-br from-[#EEF0FC] to-[#D5DCF9] rounded-xl flex items-center justify-center flex-shrink-0 shadow-sm">
                <ReceiptIco size={18} cls="text-[#725E54]"/>
              </div>
